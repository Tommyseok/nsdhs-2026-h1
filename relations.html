<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="manifest" href="manifest.webmanifest">

<title>Runners 2026 · 관계도</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: none; }
  body { margin: 0; font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #0f172a; color: #e2e8f0; font-size: 14px; }
  button, input { font-family: inherit; }

  header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 12px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; padding-top: calc(12px + env(safe-area-inset-top, 0)); }
  .header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  header h1 { margin: 0; font-size: 16px; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .subtitle { color: #94a3b8; font-size: 11px; }
  .icon-btn { background: #334155; border: 1px solid #475569; color: #e2e8f0; width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; }
  .icon-btn:active { background: #475569; transform: scale(0.95); }

  .search-row { padding: 8px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; gap: 8px; align-items: center; }
  .search-row input { flex: 1; background: #0f172a; color: #e2e8f0; border: 1px solid #475569; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; }
  .search-row input:focus { border-color: #3b82f6; }

  .chip-row { display: flex; gap: 6px; padding: 8px 12px; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: thin; align-items: center; }
  .chip-row::-webkit-scrollbar { height: 4px; }
  .chip-row::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
  .chip { flex-shrink: 0; background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 999px; padding: 7px 14px; font-size: 13px; cursor: pointer; user-select: none; white-space: nowrap; scroll-snap-align: start; }
  .chip:active { transform: scale(0.95); }
  .chip.active { background: #3b82f6; border-color: #3b82f6; color: #fff; box-shadow: 0 0 0 1px rgba(59,130,246,.3); }
  .chip-label { color: #94a3b8; font-size: 11px; align-self: center; padding: 0 6px; font-weight: 600; flex-shrink: 0; }

  .grade-row { display: flex; gap: 6px; padding: 6px 16px 10px; background: #1e293b; border-bottom: 1px solid #334155; align-items: center; flex-wrap: wrap; }
  .grade-pill { background: transparent; color: #94a3b8; border: 1px solid #475569; border-radius: 999px; padding: 4px 10px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .grade-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .grade-pill.active { background: #0f172a; color: #f1f5f9; border-color: #64748b; }
  .grade-pill.off { opacity: 0.4; text-decoration: line-through; }
  .toggle-line { background: transparent; color: #94a3b8; border: 1px solid #475569; border-radius: 999px; padding: 4px 10px; font-size: 11px; cursor: pointer; margin-left: auto; }
  .toggle-line.active { background: #0f172a; color: #f1f5f9; border-color: #64748b; }

  main { display: grid; grid-template-columns: 240px 1fr 340px; height: calc(100vh - 260px); position: relative; }
  aside.left { background: #1e293b; border-right: 1px solid #334155; overflow-y: auto; padding: 12px; }
  aside.left h2 { margin: 0 0 8px 0; font-size: 13px; color: #f1f5f9; border-bottom: 2px solid #3b82f6; padding-bottom: 6px; position: sticky; top: 0; background: #1e293b; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
  .index-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .index-tabs button { flex: 1; background: #0f172a; color: #94a3b8; border: 1px solid #334155; padding: 6px; font-size: 11px; border-radius: 4px; cursor: pointer; }
  .index-tabs button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .index-class { margin-bottom: 8px; }
  .index-class-header { font-size: 11px; font-weight: 700; color: #fbbf24; padding: 5px 7px; background: rgba(251,191,36,0.08); border-left: 3px solid #fbbf24; border-radius: 2px; display: flex; justify-content: space-between; }
  .index-class-header .count { color: #94a3b8; font-weight: 400; font-size: 10px; }
  .index-class-list { padding: 3px 0 6px 0; }
  .index-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 2px 0; border-radius: 5px; cursor: pointer; font-size: 12px; color: #cbd5e1; }
  .index-item:active { background: #475569; }
  .index-item.active { background: #3b82f6; color: #fff; font-weight: 600; }
  .index-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .index-item .dot.square { border-radius: 2px; }
  .index-item .att-bar { width: 16px; height: 4px; border-radius: 2px; margin-left: 4px; flex-shrink: 0; }
  .index-item .meta { color: #64748b; font-size: 10px; margin-left: auto; }

  .canvas-wrap { position: relative; overflow: auto; background: #020617; padding: 14px; -webkit-overflow-scrolling: touch; }
  .canvas-inner { position: relative; min-height: 100%; }
  .relations-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; transition: opacity .25s; }
  .relations-svg.hidden { opacity: 0; }
  .group-block { background: rgba(30,41,59,.55); border: 1px solid #334155; border-radius: 10px; padding: 12px; margin-bottom: 12px; position: relative; z-index: 2; }
  .group-title { font-size: 13px; font-weight: 700; color: #fbbf24; margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .group-title .count { background: #334155; color: #cbd5e1; font-size: 10px; padding: 2px 7px; border-radius: 9px; font-weight: 400; }
  .group-title .sub { color: #cbd5e1; font-size: 11px; font-weight: 500; background: rgba(124,58,237,.15); padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(167,139,250,.25); }
  .card-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .card { background: #1e293b; border: 2px solid transparent; border-radius: 10px; padding: 9px 11px; min-width: 140px; cursor: pointer; transition: all .15s; position: relative; touch-action: manipulation; overflow: hidden; }
  .card:active { transform: scale(0.97); }
  .card.active { border-color: #fde047; box-shadow: 0 0 0 3px rgba(253,224,71,.2); background: #334155; }
  .card.dimmed { opacity: 0.22; }
  .card .att-strip { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .card .card-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; line-height: 1.3; margin-left: 3px; }
  .card .card-name .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .card .card-name .dot.square { border-radius: 2px; }
  .card .card-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; line-height: 1.4; margin-left: 3px; }
  .card .card-school { font-size: 10px; color: #60a5fa; margin-top: 1px; margin-left: 3px; }
  .card .card-att { font-size: 10px; margin-top: 4px; margin-left: 3px; display: flex; align-items: center; gap: 4px; }
  .card .card-att .att-label { font-weight: 700; padding: 1px 6px; border-radius: 8px; }
  .card .card-att .att-raw { color: #64748b; font-size: 10px; }
  .card .card-badges { position: absolute; top: -7px; right: -4px; display: flex; gap: 2px; }
  .badge-mini { font-size: 9px; padding: 2px 6px; border-radius: 9px; font-weight: 700; }
  .badge-mini.star { background: #f59e0b; color: #fff; }
  .badge-mini.absent { background: #64748b; color: #fff; }
  .badge-mini.birthday { background: #ec4899; color: #fff; animation: bdPulse 1.6s ease-in-out infinite; }
  @keyframes bdPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(236,72,153,.6); } 50% { box-shadow: 0 0 0 4px rgba(236,72,153,0); } }
  .card.birthday-month { background: linear-gradient(135deg, #1e293b 60%, #4c1d95 130%); border-color: rgba(236,72,153,.4); }
  .card.birthday-month::after { content: '🎂'; position: absolute; top: -10px; left: -8px; font-size: 14px; background: #ec4899; color: #fff; border-radius: 50%; width: 22px; height: 22px; display:flex; align-items:center; justify-content:center; box-shadow: 0 2px 6px rgba(236,72,153,.5); }

  /* 상단 생일 알림 박스 */
  .bd-banner { background: linear-gradient(90deg, #4c1d95 0%, #831843 100%); padding: 10px 16px; border-bottom: 1px solid #6b21a8; color: #fce7f3; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 12px; }
  .bd-banner .bd-icon { font-size: 18px; }
  .bd-banner .bd-title { font-weight: 700; color: #fff; font-size: 13px; }
  .bd-banner .bd-list { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .bd-banner .bd-item { background: rgba(255,255,255,.13); padding: 4px 10px; border-radius: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .bd-banner .bd-item:hover, .bd-banner .bd-item:active { background: rgba(255,255,255,.25); transform: translateY(-1px); }
  .bd-banner .bd-item .d-day { color: #fbcfe8; font-weight: 700; margin-left: 4px; }
  .bd-banner .bd-item.today { background: #ec4899; color: #fff; font-weight: 700; }
  .bd-banner .bd-empty { color: #fbcfe8; opacity: 0.7; font-size: 11px; }

  /* 공지 배너 */
  .ann-banner { background: linear-gradient(135deg, #1e3a8a 0%, #312e81 50%, #4c1d95 100%); padding: 10px 16px; border-bottom: 1px solid #3730a3; color: #e0e7ff; }
  .ann-banner-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .ann-banner-title .ann-icon { font-size: 16px; }
  .ann-banner-title .ann-help { margin-left: auto; background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 10px; cursor: pointer; }
  .ann-banner-title .ann-help:hover { background: rgba(255,255,255,.25); }
  .ann-list { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scrollbar-width: thin; scroll-snap-type: x mandatory; }
  .ann-list::-webkit-scrollbar { height: 4px; }
  .ann-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 2px; }
  .ann-card { flex-shrink: 0; background: rgba(15,23,42,.55); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 8px 11px; min-width: 165px; max-width: 220px; cursor: pointer; transition: all .15s; scroll-snap-align: start; position: relative; }
  .ann-card:hover, .ann-card:active { background: rgba(15,23,42,.85); border-color: rgba(255,255,255,.25); transform: translateY(-1px); }
  .ann-card.has-new::before { content: ''; position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: #f43f5e; border-radius: 50%; box-shadow: 0 0 0 2px rgba(244,63,94,.3); animation: bdPulse 1.8s ease-in-out infinite; }
  .ann-card .ann-role { font-size: 10px; font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
  .ann-card .ann-role .ann-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ann-card .ann-name { font-size: 12px; color: #f8fafc; font-weight: 600; margin-bottom: 4px; }
  .ann-card .ann-latest { font-size: 11px; color: #cbd5e1; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .ann-card .ann-deadline { font-size: 10px; color: #fbbf24; margin-top: 4px; font-weight: 600; }
  .ann-card .ann-empty { font-size: 11px; color: #64748b; font-style: italic; }

  /* 공지 모달 */
  .ann-modal-content { padding: 0; }
  .ann-bureau-header { padding: 16px 20px; background: linear-gradient(135deg, var(--bureau-color, #6366f1) 0%, rgba(0,0,0,.5) 100%); border-radius: 14px 14px 0 0; display: flex; justify-content: space-between; align-items: center; }
  .ann-bureau-header h2 { margin: 0; font-size: 17px; color: #fff; font-weight: 700; }
  .ann-bureau-header .sub { font-size: 12px; color: rgba(255,255,255,.85); margin-top: 2px; }
  .ann-item { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; transition: all .25s; position: relative; }
  .ann-item.focus { border-color: #fde047; box-shadow: 0 0 0 2px rgba(253,224,71,.18); }
  .ann-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .ann-item-title { font-size: 14px; font-weight: 700; color: #f1f5f9; flex: 1; min-width: 120px; }
  .ann-item-date { font-size: 11px; color: #94a3b8; background: #334155; padding: 2px 8px; border-radius: 9px; }
  .ann-item-deadline { font-size: 11px; color: #fff; background: #f59e0b; padding: 2px 8px; border-radius: 9px; font-weight: 600; }
  .ann-item-content { font-size: 12px; line-height: 1.7; color: #cbd5e1; padding: 10px 12px; background: #1e293b; border-radius: 6px; border-left: 3px solid var(--bureau-color, #6366f1); }
  .ann-item-actions { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .ann-url-btn { background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .ann-url-btn:hover { background: #475569; }
  .ann-url-text { font-family: 'SF Mono', Consolas, monospace; font-size: 10px; color: #64748b; word-break: break-all; flex: 1; }
  .ann-empty-msg { text-align: center; color: #64748b; padding: 30px 20px; font-size: 12px; }
  .ann-howto { background: #1e293b; border: 1px dashed #475569; border-radius: 8px; padding: 12px 14px; margin-top: 18px; font-size: 11px; color: #94a3b8; line-height: 1.6; }
  .ann-howto strong { color: #e2e8f0; }
  .ann-howto code { background: #0f172a; padding: 1px 5px; border-radius: 3px; color: #fde047; font-family: 'SF Mono', Consolas, monospace; }

  /* 긴급 기도제목 박스 — emerald·teal 톤 */
  .prayer-block { background: linear-gradient(135deg, rgba(6,78,59,.32) 0%, rgba(19,78,74,.32) 100%); border: 1px solid rgba(20,184,166,.4); }
  .prayer-block .group-title { color: #6ee7b7; }
  .prayer-block .group-title .count { background: #0d9488; color: #fff; }
  .prayer-card { background: linear-gradient(135deg, #065f46 0%, #134e4a 100%); border: 1px solid rgba(20,184,166,.5); border-radius: 10px; padding: 10px 12px; min-width: 200px; cursor: pointer; transition: all .15s; flex: 1 1 calc(33.333% - 6px); position: relative; }
  .prayer-card:hover, .prayer-card:active { transform: translateY(-2px); border-color: #14b8a6; box-shadow: 0 8px 20px rgba(20,184,166,.28); }
  .prayer-card.urgent::before { content: ''; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: #5eead4; border-radius: 50%; animation: bdPulse 1.6s ease-in-out infinite; box-shadow: 0 0 0 2px rgba(94,234,212,.35); }
  .prayer-card .pr-student { font-size: 12px; font-weight: 700; color: #a7f3d0; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .prayer-card .pr-student .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .prayer-card .pr-title { font-size: 13px; color: #f0fdfa; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
  .prayer-card .pr-content { font-size: 11px; color: #ccfbf1; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .prayer-card .pr-date { font-size: 10px; color: #6ee7b7; margin-top: 6px; opacity: 0.85; display: flex; gap: 6px; }

  /* 학생 상세 패널 기도제목 섹션 */
  .pr-mini { background: linear-gradient(135deg, rgba(6,78,59,.25), rgba(19,78,74,.25)); border-left: 3px solid #14b8a6; padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; font-size: 11px; }
  .pr-mini .pr-mini-title { color: #a7f3d0; font-weight: 700; margin-bottom: 3px; }
  .pr-mini .pr-mini-content { color: #cbd5e1; line-height: 1.5; }
  .pr-mini .pr-mini-meta { color: #6ee7b7; font-size: 10px; margin-top: 3px; }

  @media (max-width: 900px) {
    .prayer-card { flex: 1 1 100%; min-width: 0; }
  }

  /* 심방 마크 */
  .badge-mini.visit { background: #0ea5e9; color: #fff; }
  .card.visited::before { content: '📋'; position: absolute; top: 4px; left: 4px; font-size: 12px; z-index: 3; }

  /* 심방 일지 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 150; opacity: 0; pointer-events: none; transition: opacity .25s; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal { background: #1e293b; border-radius: 14px; max-width: 760px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 0; box-shadow: 0 20px 60px rgba(0,0,0,.5); transform: translateY(20px); transition: transform .25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { position: sticky; top: 0; background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); padding: 16px 20px; border-radius: 14px 14px 0 0; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
  .modal-header h2 { margin: 0; font-size: 18px; color: #fff; font-weight: 700; }
  .modal-header .close { background: rgba(255,255,255,.2); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
  .modal-body { padding: 18px 22px 24px; }
  .visit-log { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .visit-log-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #334155; flex-wrap: wrap; }
  .visit-pastor { font-weight: 700; color: #f1f5f9; font-size: 14px; }
  .visit-date { color: #94a3b8; font-size: 12px; background: #334155; padding: 2px 8px; border-radius: 10px; }
  .visit-students { color: #60a5fa; font-size: 11px; margin-left: auto; }
  .visit-student-block { margin-bottom: 14px; }
  .visit-student-block:last-child { margin-bottom: 0; }
  .visit-student-name { font-size: 14px; font-weight: 700; color: #fde047; margin-bottom: 6px; cursor: pointer; display: inline-block; padding: 3px 10px; background: rgba(253,224,71,.1); border-radius: 12px; }
  .visit-student-name:hover { background: rgba(253,224,71,.2); }
  .visit-content { font-size: 12px; line-height: 1.7; color: #cbd5e1; margin-bottom: 8px; padding: 8px 10px; background: #1e293b; border-radius: 6px; border-left: 3px solid #64748b; }
  .visit-prayer { font-size: 12px; line-height: 1.6; color: #fbcfe8; padding: 8px 10px; background: rgba(236,72,153,.07); border-radius: 6px; border-left: 3px solid #ec4899; }
  .visit-prayer strong { color: #f9a8d4; }

  /* 상세 패널 심방 섹션 */
  .visit-mini { background: rgba(14,165,233,.08); border-left: 3px solid #0ea5e9; padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; font-size: 11px; }
  .visit-mini .visit-mini-meta { color: #7dd3fc; font-weight: 600; margin-bottom: 4px; }
  .visit-mini .visit-mini-content { color: #cbd5e1; line-height: 1.5; }
  .visit-mini .visit-mini-prayer { color: #fbcfe8; line-height: 1.5; margin-top: 4px; padding-top: 4px; border-top: 1px dashed rgba(236,72,153,.3); }
  .card.teacher { background: #334155; border: 2px dashed #64748b; }
  .card.teacher .card-att { display: none; }
  .card.teacher .att-strip { display: none; }
  .card-rel-icons { display: flex; gap: 3px; margin-top: 5px; margin-left: 3px; }
  .card-rel-icons .ri { width: 6px; height: 6px; border-radius: 50%; }

  aside.right { background: #1e293b; border-left: 1px solid #334155; overflow-y: auto; padding: 18px; }

<script>
const PRIVATE_KEY = 'runners2026@jesus';
function showGate(msg) {
  document.getElementById('gate-root').classList.remove('hidden');
  document.getElementById('gate-err').textContent = msg || '';
}
function hideGate() {
  document.getElementById('gate-root').classList.add('hidden');
  document.getElementById('term-bar').style.display = 'flex';
}
function checkGate() {
  const v = document.getElementById('gate-input').value.trim();
  if (v === PRIVATE_KEY) {
    localStorage.setItem('teacher_key', v);
    location.search = '?key=' + encodeURIComponent(v);
  } else {
    showGate('❌ 키가 일치하지 않습니다');
  }
}
(function gate() {
  const params = new URLSearchParams(location.search);
  const urlKey = params.get('key');
  const saved = localStorage.getItem('teacher_key');
  if (urlKey === PRIVATE_KEY) {
    localStorage.setItem('teacher_key', urlKey);
    hideGate();
  } else if (saved === PRIVATE_KEY) {
    location.search = '?key=' + encodeURIComponent(saved);
  } else {
    showGate();
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'gate-input') checkGate();
    });
  }
})();

function termSub(c) {

/* ===== 생일 유틸 ===== */
const TODAY = new Date();
function parseBD(bd) {
  if (!bd || typeof bd !== 'string' || !/^\d{2}-\d{2}$/.test(bd)) return null;
  const [m, d] = bd.split('-').map(Number);
  if (m < 1 || m > 12 || d < 1 || d > 31) return null;
  return { m, d };
}
function isBirthdayThisMonth(bd) {
  const p = parseBD(bd);
  if (!p) return false;
  return p.m === TODAY.getMonth() + 1;
}
function isBirthdayToday(bd) {
  const p = parseBD(bd);
  if (!p) return false;
  return p.m === TODAY.getMonth() + 1 && p.d === TODAY.getDate();
}
function daysUntilBirthday(bd) {
  const p = parseBD(bd);
  if (!p) return null;
  const y = TODAY.getFullYear();
  const today0 = new Date(y, TODAY.getMonth(), TODAY.getDate());
  let target = new Date(y, p.m - 1, p.d);
  if (target < today0) target = new Date(y + 1, p.m - 1, p.d);
  return Math.round((target - today0) / (1000*60*60*24));
}
function bdLabel(bd) {
  const p = parseBD(bd);
  if (!p) return '';
  return `${p.m}/${p.d}`;
}

function unionGroups(relType) {
  const parent = {};
  function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
  function union(a,b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }
  const persons = new Set();
  edges.filter(e => e.rel === relType).forEach(e => { persons.add(e.from); persons.add(e.to); });
  persons.forEach(p => { parent[p] = p; });
  edges.filter(e => e.rel === relType).forEach(e => { if (parent[e.from] !== undefined && parent[e.to] !== undefined) union(e.from, e.to); });
  const groups = {};
  persons.forEach(p => { const r = find(p); if (!groups[r]) groups[r] = []; groups[r].push(p); });
  return Object.values(groups);
}

const POSITION_ORDER = ['담당 목사','부장집사','총무','교육국장','예배국장','미디어국장','홍보국장'];
function positionRank(p) {
  if (!p || !p.position) return 99;
  const i = POSITION_ORDER.indexOf(p.position);
  return i === -1 ? 99 : i;
}

function shouldShow(p) {
  if (!state.showGrades[gradeKey(p)]) return false;
  if (!isTeacher(p.id)) {
    const lvl = attLevel(p);

}

/* ===== 좌측 인덱스 ===== */
function buildIndexInto(containerId, view) {
  const body = document.getElementById(containerId);
  body.innerHTML = '';
  const all = [
    ...students.map(s => ({...s, _type:'student'})),
    ...teachers.map(t => ({...t, _type:'teacher', grade:'T'}))
  ];
  let groups = {}, order = [];
  if (view === 'class') {
    const co = termOrder();
    co.forEach(c => { groups[c]=[]; order.push(c); });
    all.forEach(p => { const c = termFieldOf(p); if (groups[c]) groups[c].push(p); });
    // 국장단 인덱스에도 직책자 모두 (담임반과 중복)
    teachers.filter(t => t.position && t.cls !== '국장단').forEach(t => {
      const dup = {...t, _type:'teacher', grade:'T'};
      if (!groups['국장단'].find(x => x.id === t.id)) groups['국장단'].push(dup);
    });
    order = order.filter(c => groups[c] && groups[c].length);
    order.forEach(c => groups[c].sort((a,b) => {
      if (a._type !== b._type) return a._type==='teacher' ? -1 : 1;
      if (c === '국장단') return positionRank(a) - positionRank(b);
      return (a.grade||9) - (b.grade||9);
    }));
  } else if (view === 'grade') {
    order = ['T','1','2','3']; order.forEach(g => groups[g] = []);
    all.forEach(p => { const g = p._type==='teacher' ? 'T' : String(p.grade); if (!groups[g]) return; groups[g].push(p); });
    order = order.filter(g => groups[g] && groups[g].length);
    Object.keys(groups).forEach(g => groups[g].sort((a,b)=>(a.cls||'').localeCompare(b.cls||'')));
  } else {
    groups['ALL'] = all.slice().sort((a,b) => a.id.localeCompare(b.id,'ko'));
    order = ['ALL'];
  }
  order.forEach(g => {
    const items = groups[g];
    if (!items || !items.length) return;
    const wrap = document.createElement('div'); wrap.className='index-class';
    const head = document.createElement('div'); head.className='index-class-header';
    const headLabel = view==='class' ? termLabel(g) : view==='grade' ? (g==='T'?'교사':g+'학년') : '전체';
    const headSub = view==='class' ? termSub(g) : '';
    head.innerHTML = `<span>${headLabel}${headSub?` <span style="color:#94a3b8;font-weight:400;font-size:9.5px;">${headSub}</span>`:''}</span><span class="count">${items.length}</span>`;
    wrap.appendChild(head);
    const list = document.createElement('div'); list.className='index-class-list';
    items.forEach(it => {
      const el = document.createElement('div');
      el.className = 'index-item';
      el.dataset.id = it.id;
      const dc = it._type==='teacher' ? TEACHER_COLOR : personColor(it);
      const dcls = it._type==='teacher' ? 'dot square' : 'dot';
      const bdMark = it._type !== 'teacher' && (isBirthdayToday(it.birthday) ? '🎂 ' : isBirthdayThisMonth(it.birthday) ? '🎂' : '');
      const ic = bdMark + (it.star?'⭐ ':'') + (it.absent?'🚪 ':'');
      const lvl = attLevel(it);
      const attBar = it._type==='teacher' ? '' : `<span class="att-bar" style="background:${ATT_COLOR[lvl]}"></span>`;
      const meta = it._type==='teacher' ? it.role : (it.grade?it.grade+'학':'')+(it.gender?' '+it.gender[0]:'');
      el.innerHTML = `<span class="${dcls}" style="background:${dc}"></span>${ic}${it.id}${attBar}<span class="meta">${meta||''}</span>`;
      el.addEventListener('click', () => { activateCard(it.id, true); closeDrawer(); });
      list.appendChild(el);
    });
    wrap.appendChild(list);
    body.appendChild(wrap);
  });
}

/* ===== 그룹화 ===== */
function buildGroups() {
  const wrap = document.getElementById('groups');
  wrap.innerHTML = '';
  // 모든 모드에서 맨 위에 긴급 기도제목 박스
  const prayerBlock = buildPrayerBlock();
  if (prayerBlock) wrap.appendChild(prayerBlock);
  const all = [...students, ...teachers].filter(shouldShow);
  let blocks = [];

  if (state.mode === 'class') {
    const co = termOrder();
    co.forEach(c => {
      let items = all.filter(p => termFieldOf(p) === c);
      if (c === '국장단') items.sort((a,b) => positionRank(a) - positionRank(b));
      if (items.length) blocks.push({ title: termLabel(c), items, sub: termSub(c) });
    });
  } else if (state.mode === 'grade') {
    [['T','교사'],['1','1학년'],['2','2학년'],['3','3학년']].forEach(([k, label]) => {
      const items = all.filter(p => gradeKey(p) === k);
      if (items.length) blocks.push({ title:label, items, sub:'' });
    });
  } else if (state.mode === 'attendance') {
    [[1,'⭐ Lv1 매우 우수 (A · 85%+)'],[2,'✅ Lv2 양호 (B · 50~84%)'],[3,'⚠ Lv3 저조 (C · 20~49%)'],[4,'🚪 Lv4 장결 (D · 0~19%)'],[0,'❓ 미상']].forEach(([k,label]) => {
      const items = all.filter(p => !isTeacher(p.id) && attLevel(p) === k);
      if (items.length) blocks.push({ title:label, items, sub:`${items.length}명` });
    });
    const tcs = all.filter(p => isTeacher(p.id));
    if (tcs.length) blocks.push({ title:'교사', items:tcs, sub:'참고용' });
  } else if (state.mode === 'school') {
    const sm = {};
    all.forEach(p => { const s = (p.school && p.school.trim()) || '학교 미입력'; (sm[s] = sm[s] || []).push(p); });
    Object.keys(sm).sort((a,b) => sm[b].length - sm[a].length).forEach(k => {
      if (k === '학교 미입력') return;
      blocks.push({ title:k, items:sm[k], sub:`${sm[k].length}명` });
    });
    if (sm['학교 미입력']) blocks.push({ title:'학교 미입력', items:sm['학교 미입력'], sub:'' });
  } else if (state.mode === 'star') {
    const items = all.filter(p => p.star);
    blocks.push({ title:'⭐ 집중 케어', items, sub:`${items.length}명` });
    const others = all.filter(p => !p.star);
    if (others.length) blocks.push({ title:'그 외 전체', items:others, sub:'참고용' });
  } else if (state.mode === 'visited') {
    const items = all.filter(p => !isTeacher(p.id) && visitsByStudent[p.id]);
    blocks.push({ title:'📋 심방 받은 학생', items, sub:`${items.length}명` });
    const others = all.filter(p => !visitsByStudent[p.id]);
    if (others.length) blocks.push({ title:'그 외 전체', items:others, sub:'참고용' });
  } else {
    const groups = unionGroups(state.mode);
    groups.sort((a,b) => b.length - a.length);
    groups.forEach((groupIds, idx) => {
      const items = groupIds.map(id => personById[id]).filter(p => p && shouldShow(p));
      if (!items.length) return;
      const title = `${REL_STYLE[state.mode].label} 그룹 #${idx+1}`;
      const namesPreview = items.map(p=>p.id).join('·');
      blocks.push({ title, items, sub: namesPreview.length>30 ? items.length+'명' : namesPreview });
    });
    const inRel = new Set(); groups.forEach(g => g.forEach(id => inRel.add(id)));
    const rest = all.filter(p => !inRel.has(p.id));
    if (rest.length) blocks.push({ title:'관계 없음', items:rest, sub:`${rest.length}명 (이 관계 외)` });
  }

  blocks.forEach(b => {
    const block = document.createElement('div'); block.className = 'group-block';
    block.innerHTML = `<div class="group-title"><span>${b.title}</span><span class="count">${b.items.length}</span><span class="sub">${b.sub||''}</span></div>`;
    const grid = document.createElement('div'); grid.className = 'card-grid';
    b.items.forEach(p => grid.appendChild(buildCard(p)));
    block.appendChild(grid);
    wrap.appendChild(block);
  });

  requestAnimationFrame(drawRelations);
}

function buildCard(p) {
  const isT = !!isTeacher(p.id);
  const card = document.createElement('div');
  card.className = 'card' + (isT?' teacher':'');
  card.dataset.id = p.id;
  if (state.activeId === p.id) card.classList.add('active');
  const color = personColor(p);
  const dotCls = isT ? 'dot square' : 'dot';
  const badges = [];
  const isBdToday = isBirthdayToday(p.birthday);
  const isBdMonth = isBirthdayThisMonth(p.birthday);
  if (isBdToday) badges.push('<span class="badge-mini birthday">🎂 오늘!</span>');
  else if (isBdMonth) badges.push('<span class="badge-mini birthday">🎂 이번달!</span>');
  if (p.star) badges.push('<span class="badge-mini star">⭐</span>');
  if (p.absent) badges.push('<span class="badge-mini absent">🚪</span>');
  const hasVisit = visitsByStudent[p.id] && visitsByStudent[p.id].length > 0;
  if (hasVisit) card.classList.add('visited');
  const hasPrayer = !isT && getPrayersForStudent(p.id).length > 0;
  if (hasPrayer) badges.push('<span class="badge-mini" style="background:#0d9488;color:#fff">🙏</span>');
  const relIcons = [];
  ['family','friend','conflict','care','school','ride'].forEach(r => {
    const has = edges.some(e => e.rel===r && (e.from===p.id || e.to===p.id));
    if (has) relIcons.push(`<span class="ri" style="background:${REL_STYLE[r].color}"></span>`);
  });
  const bdTxt = !isT && p.birthday ? bdLabel(p.birthday) : '';
  const meta = isT ? `${p.cls}반 · ${p.role}` : `${p.cls}반 · ${p.grade}학년${p.gender?' · '+p.gender:''}${bdTxt?' · 🎂 '+bdTxt:''}`;
  const school = (!isT && p.school) ? `<div class="card-school">${p.school}</div>` : '';
  if (!isT && (isBdToday || isBdMonth)) card.classList.add('birthday-month');
  const lvl = attLevel(p);
  const attStrip = isT ? '' : `<div class="att-strip" style="background:${ATT_COLOR[lvl]}"></div>`;
  const attBlock = isT ? '' : `<div class="card-att">
    <span class="att-label" style="background:${ATT_COLOR[lvl]}33;color:${ATT_COLOR[lvl]}">${ATT_LABEL[lvl]}</span>
    <span class="att-raw">${attRateText(p)}</span>
  </div>`;
  card.innerHTML = `
    ${attStrip}
    <div class="card-badges">${badges.join('')}</div>
    <div class="card-name"><span class="${dotCls}" style="background:${color}"></span>${p.id}</div>
    <div class="card-meta">${meta}</div>
    ${school}
    ${attBlock}
    <div class="card-rel-icons">${relIcons.join('')}</div>
  `;
  card.addEventListener('click', () => activateCard(p.id, false));
  if (!('ontouchstart' in window)) {
    card.addEventListener('mouseenter', () => { state.hoverId = p.id; highlight(); });
    card.addEventListener('mouseleave', () => { state.hoverId = null; highlight(); });
  }
  return card;
}

function activateCard(id, scrollTo) {
  state.activeId = id;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  document.querySelectorAll('.index-item').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  if (scrollTo) {
    const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
    if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
  }
  showDetail(id);
  drawRelations();
}

/* ===== SVG ===== */
function drawRelations() {
  const svg = document.getElementById('rel-svg');
  const inner = document.querySelector('.canvas-inner');
  if (!svg || !inner) return;
  if (!state.showLines) { svg.classList.add('hidden'); svg.innerHTML = ''; return; }
  svg.classList.remove('hidden');
  const w = inner.scrollWidth, h = inner.scrollHeight;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.innerHTML = '';
  const innerRect = inner.getBoundingClientRect();
  const cards = {};
  document.querySelectorAll('.card').forEach(c => {
    const r = c.getBoundingClientRect();
    if (!cards[c.dataset.id]) cards[c.dataset.id] = [];
    cards[c.dataset.id].push({ x: r.left - innerRect.left + r.width/2, y: r.top - innerRect.top + r.height/2 });
  });
  edges.forEach(e => {
    const aList = cards[e.from], bList = cards[e.to];
    if (!aList || !bList) return;
    let best = null;
    aList.forEach(a => bList.forEach(b => {
      const d = Math.hypot(a.x-b.x, a.y-b.y);
      if (!best || d < best.d) best = { a, b, d };
    }));
    if (!best) return;
    const st = REL_STYLE[e.rel];
    const focusId = state.hoverId || state.activeId;
    const isFocus = focusId && (focusId === e.from || focusId === e.to);
    const isDimmed = focusId && !isFocus;
    const isModeRel = state.mode === e.rel;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const dx = best.b.x - best.a.x, dy = best.b.y - best.a.y;
    const mx = (best.a.x + best.b.x)/2, my = (best.a.y + best.b.y)/2;
    const offset = Math.min(80, Math.abs(dx)*0.15 + Math.abs(dy)*0.05);
    path.setAttribute('d', `M ${best.a.x} ${best.a.y} Q ${mx} ${my - offset} ${best.b.x} ${best.b.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', st.color);
    path.setAttribute('stroke-width', (isFocus ? st.width+1.5 : (isModeRel ? st.width+0.5 : st.width)));
    if (st.dash) path.setAttribute('stroke-dasharray', st.dash);
    path.setAttribute('opacity', isDimmed ? 0.1 : (isModeRel ? 0.95 : 0.6));
    path.setAttribute('stroke-linecap', 'round');
    path.style.pointerEvents = 'stroke';
    path.style.cursor = 'pointer';
    path.addEventListener('click', () => showEdgeDetail(e));
    const t = document.createElementNS('http://www.w3.org/2000/svg','title');
    t.textContent = `${st.label}: ${e.from} ↔ ${e.to} — ${e.label||''}`;
    path.appendChild(t);
    svg.appendChild(path);
  });
}

function highlight() {
  const focusId = state.hoverId || state.activeId;
  if (!focusId) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('dimmed'));
  } else {
    const connected = new Set([focusId]);
    edges.forEach(e => { if (e.from === focusId) connected.add(e.to); if (e.to === focusId) connected.add(e.from); });
    document.querySelectorAll('.card').forEach(c => c.classList.toggle('dimmed', !connected.has(c.dataset.id)));
  }
  drawRelations();
}

      const tag = isToday ? '🎂 오늘 생일!' : (d <= 14 ? `🎂 D-${d}` : `🎂 ${bdLabel(p.birthday)}`);
      badges.push(`<span class="badge" style="background:#831843;color:#fce7f3">${tag}</span>`);

  const connected = edges.filter(e => e.from===id || e.to===id);

    const other = e.from===id ? e.to : e.from;

  });
  function relList(arr) {

    return '<ul class="rel-list">' + arr.map(r =>
      `<li onclick="activateCard('${r.other}', true)">

  // 긴급 기도제목

  if (!isT) {
    const prs = getPrayersForStudent(id);

          </div>
        `).join('') + '</div>';
    }
  }

  // 심방 기록
  let visitSection = '';
  if (!isT && visitsByStudent[id]) {
    const visits = visitsByStudent[id];
    visitSection = '<div class="detail-section"><h3>💬 심방 기록</h3>' +
      visits.map(v => `
        <div class="visit-mini">
          <div class="visit-mini-meta">📋 ${v.pastor} 목사 · ${v.date}</div>
          <div class="visit-mini-content">${v.content}</div>
          ${v.prayer ? `<div class="visit-mini-prayer"><strong>기도제목:</strong> ${v.prayer}</div>` : ''}
        </div>
      `).join('') + '</div>';
  }
  const header = isT
    ? `<div class="detail-name">${p.id}</div><div class="detail-meta">${p.cls}반 · ${p.role}</div>`
    : `<div class="detail-name">${p.id}</div>
       <div class="detail-meta">${p.cls}반 · ${p.grade}학년 · ${p.gender||''}${p.school?' · '+p.school:''}</div>
       <div>${badges.join('')}</div>

function bureauByKey(key) { return BUREAUS.find(b => b.key === key); }
function announcementsByBureau(key) {
  return ANNOUNCEMENTS.filter(a => a.bureau === key).sort((a,b) => (b.date||'').localeCompare(a.date||''));
}
function isAnnouncementNew(a) {
  if (!a || !a.deadline) return false;
  const today = new Date();
  const dl = new Date(a.deadline + 'T23:59:59');
  return dl >= today;  // 마감 안 지났으면 "new"
}

function renderAnnouncementBanner() {
  const banner = document.getElementById('ann-banner');
  if (!banner) return;
  const cards = BUREAUS.map(b => {
    const list = announcementsByBureau(b.key);
    const latest = list[0];
    const hasNew = latest && isAnnouncementNew(latest);
    const latestHTML = latest
      ? `<div class="ann-latest">${latest.title}</div>${latest.deadline?`<div class="ann-deadline">~ ${latest.deadline.slice(5)}</div>`:''}`
      : `<div class="ann-empty">아직 공지 없음</div>`;
    return `<div class="ann-card${hasNew?' has-new':''}" data-bureau="${b.key}">
      <div class="ann-role"><span class="ann-dot" style="background:${b.color}"></span>${b.pos}</div>
      <div class="ann-name">${b.name}</div>
      ${latestHTML}
    </div>`;
  }).join('');
  banner.innerHTML = `
    <div class="ann-banner-title">
      <span class="ann-icon">📢</span>
      <span>목사님 / 각 국별 주요공지</span>
      <button class="ann-help" id="ann-help-btn">업데이트 방법</button>
    </div>
    <div class="ann-list">${cards}</div>
  `;
  banner.querySelectorAll('.ann-card').forEach(el => {
    el.addEventListener('click', () => openAnnouncementModal(el.dataset.bureau));
  });
  document.getElementById('ann-help-btn').addEventListener('click', e => {
    e.stopPropagation();
    openAnnouncementHelp();
  });
}

function openAnnouncementModal(bureauKey, focusAnnId) {
  const b = bureauByKey(bureauKey);
  if (!b) return;
  const list = announcementsByBureau(bureauKey);
  const header = document.getElementById('ann-modal-header');
  header.style.setProperty('--bureau-color', b.color);
  header.style.background = `linear-gradient(135deg, ${b.color} 0%, rgba(0,0,0,.55) 100%)`;
  document.getElementById('ann-modal-title').textContent = `📢 ${b.pos}`;
  document.getElementById('ann-modal-sub').textContent = `${b.name} · 공지 ${list.length}건`;
  const body = document.getElementById('ann-modal-body');
  body.style.setProperty('--bureau-color', b.color);
  if (!list.length) {
    body.innerHTML = '<div class="ann-empty-msg">아직 등록된 공지가 없습니다.</div>' + howtoHTML();
  } else {
    body.innerHTML = list.map(a => `
      <div class="ann-item" id="ann-${a.id}" style="--bureau-color:${b.color}">
        <div class="ann-item-header">
          <span class="ann-item-title">${a.title}</span>
          <span class="ann-item-date">📅 ${a.date}</span>
          ${a.deadline?`<span class="ann-item-deadline">~ ${a.deadline}</span>`:''}
        </div>
        <div class="ann-item-content">${a.content.replace(/\n/g,'<br>')}</div>
        <div class="ann-item-actions">
          <button class="ann-url-btn" data-ann="${a.id}">🔗 URL 복사</button>
          <span class="ann-url-text">?ann=${a.id}</span>
        </div>
      </div>
    `).join('') + howtoHTML();
  }
  body.querySelectorAll('.ann-url-btn').forEach(btn => {
    btn.addEventListener('click', () => copyAnnouncementUrl(btn.dataset.ann));
  });
  document.getElementById('ann-modal').classList.add('open');
  if (focusAnnId) {
    setTimeout(() => {
      const el = document.getElementById('ann-' + focusAnnId);
      if (el) {
        el.classList.add('focus');
        el.scrollIntoView({ behavior:'smooth', block:'center' });
      }
    }, 200);
  }
}

function howtoHTML() {
  return `<div class="ann-howto">
    <strong>📝 공지 추가·수정하는 방법</strong><br>
    1. 카톡으로 <strong>국 / 제목 / 마감일 / 내용</strong>을 보내주세요<br>

      • <strong>국(bureau)</strong>: pastor (담당 목사) / deacon (부장집사) / treasurer (총무) / edu (교육국) / worship (예배국) / media (미디어국) / pr (홍보국)<br>

      해당 URL을 카톡에 공유하면 받는 사람은 페이지 진입 즉시 그 공지가 펼쳐진 상태로 보게 됩니다.

  document.getElementById('ann-modal').classList.add('open');

function copyAnnouncementUrl(annId) {
  const base = window.location.origin + window.location.pathname;
  const url = `${base}?ann=${annId}`;
  navigator.clipboard.writeText(url).then(() => {
    toast('URL이 복사되었어요. 카톡에 붙여넣기!');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('URL 복사 완료'); } catch(e) { toast('복사 실패 - URL: ' + url); }
    document.body.removeChild(ta);
  });
}

function closeAnnouncementModal() {
  document.getElementById('ann-modal').classList.remove('open');
}

// 페이지 로드 시 ?ann=XXX 파라미터 확인
function handleAnnouncementDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const annId = params.get('ann');
  if (!annId) return;
  const a = ANNOUNCEMENTS.find(x => x.id === annId);
  if (a) {
    setTimeout(() => openAnnouncementModal(a.bureau, annId), 300);
  }
}

function getPrayersForStudent(name) {
  return PRAYER_REQUESTS.filter(p => p.student === name);
}

function buildPrayerBlock() {
  if (!PRAYER_REQUESTS.length) return null;
  const block = document.createElement('div');
  block.className = 'group-block prayer-block';
  block.innerHTML = `<div class="group-title">🙏 <span>긴급 기도제목</span><span class="count">${PRAYER_REQUESTS.length}</span><span class="sub">함께 기도해 주세요</span></div>`;
  const grid = document.createElement('div');
  grid.className = 'card-grid';
  PRAYER_REQUESTS.forEach(pr => {
    const p = personById[pr.student];
    const card = document.createElement('div');
    card.className = 'prayer-card' + (pr.urgent ? ' urgent' : '');
    card.dataset.prId = pr.id;
    const color = p ? personColor(p) : '#94a3b8';
    const meta = p ? `${p.cls}반 · ${p.grade}학년` : '';
    card.innerHTML = `
      <div class="pr-student"><span class="dot" style="background:${color}"></span>${pr.student} <span style="color:#6ee7b7;font-weight:400;font-size:10px;margin-left:2px">${meta}</span></div>
      <div class="pr-title">${pr.title}</div>
      <div class="pr-content">${pr.content.split('\n')[0]}</div>
      <div class="pr-date">📅 ${pr.date}${pr.urgent?' · 🔥 긴급':''}</div>
    `;
    card.addEventListener('click', () => openPrayerModal(pr.id));
    grid.appendChild(card);
  });
  block.appendChild(grid);
  return block;
}

function openPrayerModal(prId, focus = true) {
  const list = PRAYER_REQUESTS.slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const body = document.getElementById('prayer-modal-body');
  document.getElementById('prayer-modal-sub').textContent = `함께 기도해 주세요 · ${list.length}건`;
  body.innerHTML = list.map(pr => {
    const p = personById[pr.student];
    const cls = p ? `${p.cls}반 ${p.grade}학년 ${p.gender||''}` : '';
    return `
      <div class="ann-item" id="pr-${pr.id}" style="--bureau-color:#14b8a6;border-color:rgba(20,184,166,.3)">
        <div class="ann-item-header">
          <span class="ann-item-title">🙏 ${pr.title}</span>
          <span class="ann-item-date">📅 ${pr.date}</span>
          ${pr.urgent ? `<span class="ann-item-deadline" style="background:#0d9488">🔥 긴급</span>` : ''}
        </div>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">
          <strong style="color:#a7f3d0">${pr.student}</strong> ${cls?'· '+cls:''}
          <button class="ann-url-btn" data-go="${pr.student}" style="margin-left:8px;padding:2px 8px;font-size:10px">👤 카드 보기</button>
        </div>
        <div class="ann-item-content" style="border-left-color:#14b8a6">${pr.content.replace(/\n/g,'<br>')}</div>
        <div class="ann-item-actions">
          <button class="ann-url-btn" data-pr="${pr.id}">🔗 URL 복사</button>
          <span class="ann-url-text">?prayer=${pr.id}</span>
        </div>
      </div>
    `;
  }).join('') + `<div class="ann-howto">
    <strong>🙏 기도제목 추가·수정하는 방법</strong><br>
    1. 카톡으로 <strong>학생 / 제목 / 내용 / 긴급 여부</strong>를 보내주세요<br>
    2. 또는 <code>관계도.html</code>의 <code>PRAYER_REQUESTS</code> 배열에 직접 추가 후 push<br>
    <br>
    <strong>🔗 기도제목 링크</strong> — 각 기도제목 <strong>URL 복사</strong>로 카톡 공유. 받는 사람이 누르면 그 기도제목이 펼쳐진 상태로 페이지가 열립니다.
  </div>`;
  body.querySelectorAll('.ann-url-btn[data-pr]').forEach(btn => {
    btn.addEventListener('click', () => copyPrayerUrl(btn.dataset.pr));
  });
  body.querySelectorAll('.ann-url-btn[data-go]').forEach(btn => {
    btn.addEventListener('click', () => {
      closePrayerModal();
      activateCard(btn.dataset.go, true);
    });
  });
  document.getElementById('prayer-modal').classList.add('open');
  if (focus && prId) {
    setTimeout(() => {
      const el = document.getElementById('pr-' + prId);
      if (el) {
        el.classList.add('focus');
        el.scrollIntoView({ behavior:'smooth', block:'center' });
      }
    }, 200);
  }
}

function closePrayerModal() { document.getElementById('prayer-modal').classList.remove('open'); }

function copyPrayerUrl(prId) {
  const base = window.location.origin + window.location.pathname;
  const url = `${base}?prayer=${prId}`;
  navigator.clipboard.writeText(url).then(() => toast('기도제목 URL 복사 완료')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('URL 복사 완료'); } catch(e) { toast('복사 실패'); }
    document.body.removeChild(ta);
  });
}

function handlePrayerDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const prId = params.get('prayer');
  if (!prId) return;
  if (PRAYER_REQUESTS.find(x => x.id === prId)) {
    setTimeout(() => openPrayerModal(prId, true), 300);
  }
}

/* ===== 상단 생일 알림 박스 (D-14 이내) ===== */
function renderBirthdayBanner() {
  const banner = document.getElementById('bd-banner');
  if (!banner) return;
  const list = students
    .filter(s => s.birthday)
    .map(s => ({ s, days: daysUntilBirthday(s.birthday) }))
    .filter(o => o.days !== null && o.days <= 14)
    .sort((a,b) => a.days - b.days);
  const monthName = (TODAY.getMonth()+1) + '월';
  if (!list.length) {
    banner.innerHTML = `<span class="bd-icon">🎂</span><span class="bd-title">${monthName}</span><span class="bd-empty">앞으로 2주 안에 생일인 친구가 없어요</span>`;
    return;
  }
  const itemsHTML = list.map(o => {
    const isToday = o.days === 0;
    const dLabel = isToday ? '오늘!' : `D-${o.days}`;
    return `<span class="bd-item${isToday?' today':''}" data-id="${o.s.id}">${o.s.id} <span class="d-day">(${bdLabel(o.s.birthday)} · ${dLabel})</span></span>`;
  }).join('');
  banner.innerHTML = `<span class="bd-icon">🎂</span><span class="bd-title">앞으로 2주 안에 생일</span><div class="bd-list">${itemsHTML}</div>`;
  banner.querySelectorAll('.bd-item').forEach(el => {
    el.addEventListener('click', () => activateCard(el.dataset.id, true));
  });
}

/* ===== 심방 일지 모달 ===== */
function renderVisitModal() {
  const body = document.getElementById('visit-modal-body');
  if (!visitLogs.length) {
    body.innerHTML = '<div style="text-align:center;color:#64748b;padding:40px 20px">아직 등록된 심방 기록이 없습니다.</div>';
    return;
  }
  const sorted = visitLogs.slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
  body.innerHTML = sorted.map(log => `
    <div class="visit-log">
      <div class="visit-log-header">
        <span class="visit-pastor">${log.pastor} 목사</span>
        <span class="visit-date">${log.date}</span>
        <span class="visit-students">${log.students.map(s=>s.name).join(' · ')}</span>
      </div>
      ${log.students.map(s => {
        const p = personById[s.name];
        const cls = p ? p.cls+'반 ' + p.grade + '학년' : '';
        return `
        <div class="visit-student-block">
          <div class="visit-student-name" data-name="${s.name}">👤 ${s.name} ${cls?'· '+cls:''}</div>
          <div class="visit-content">${s.content}</div>
          ${s.prayer ? `<div class="visit-prayer"><strong>🙏 기도제목:</strong> ${s.prayer}</div>` : ''}
        </div>
      `;}).join('')}
    </div>
  `).join('');
  body.querySelectorAll('.visit-student-name').forEach(el => {
    el.addEventListener('click', () => {
      closeVisitModal();
      activateCard(el.dataset.name, true);
    });
  });
}
function openVisitModal() { renderVisitModal(); document.getElementById('visit-modal').classList.add('open'); }
function closeVisitModal() { document.getElementById('visit-modal').classList.remove('open'); }
document.getElementById('visit-btn').addEventListener('click', openVisitModal);
document.getElementById('visit-modal-close').addEventListener('click', closeVisitModal);
document.getElementById('visit-modal').addEventListener('click', e => {
  if (e.target.id === 'visit-modal') closeVisitModal();
});

// 공지 모달 닫기 이벤트
document.getElementById('ann-modal-close').addEventListener('click', closeAnnouncementModal);
document.getElementById('ann-modal').addEventListener('click', e => {
  if (e.target.id === 'ann-modal') closeAnnouncementModal();
});
// 기도제목 모달 닫기 이벤트
document.getElementById('prayer-modal-close').addEventListener('click', closePrayerModal);
document.getElementById('prayer-modal').addEventListener('click', e => {
  if (e.target.id === 'prayer-modal') closePrayerModal();
});

buildIndexInto('index-body', 'class');
buildIndexInto('index-body-mobile', 'class');
buildGroups();
renderAnnouncementBanner();
renderBirthdayBanner();
handleAnnouncementDeepLink();
handlePrayerDeepLink();
setTimeout(drawRelations, 150);
window.activateCard = activateCard;
window.openPrayerModal = openPrayerModal;
</script>
