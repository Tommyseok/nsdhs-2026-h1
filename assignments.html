/* ========== 렌더링 ========== */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function memberHtml(s) {
  const labelInfo = s.label ? LABELS[s.label] : null;
  const cardCls = labelInfo ? `member has-label-${s.label}` : 'member';
  const genderCls = s.gender === '남' ? 'male' : 'female';
  return `
    <div class="${cardCls}">
      <span class="member-name">${escapeHtml(s.name)}</span>
      <span class="gender ${genderCls}">${escapeHtml(s.gender)}</span>
      <span class="grade-pill g${s.grade}">${s.grade}학년</span>
      ${labelInfo ? `<span class="member-label ${s.label}" title="${escapeHtml(labelInfo.title)}">${labelInfo.text}</span>` : ''}
    </div>
  `;
}

function cellHtml(cell, familyId) {
  const cellId = cell.name.replace(/\s/g,'');
  const homeroom = HOMEROOM_TEACHERS[cellId] || '';
  const sub = SUB_TEACHERS[cellId] || '';
  const leader = FAMILY_LEADERS[familyId];
  const isLeaderCell = leader && leader.name === homeroom; // 이 소그룹반 담임이 가족장 겸임
  // 학년→이름 가나다 순으로 정렬: 3학년 → 2학년 → 1학년, 같은 학년이면 이름 가나다
  const sorted = cell.students.slice().sort((a, b) => {
    if (a.grade !== b.grade) return b.grade - a.grade; // 3→2→1
    return a.name.localeCompare(b.name, 'ko');
  });
  return `
    <div class="cell-card">
      <div class="cell-head">
        <div class="cell-name">${escapeHtml(cell.name)}<span class="count">${cell.students.length}명</span></div>
        <div class="teacher-row homeroom">
          <span class="label">담임</span>
          ${homeroom
            ? `<span class="name">${escapeHtml(homeroom)}</span>${isLeaderCell ? '<span class="leader-badge">🌟 대가족장</span>' : ''}`
            : `<span class="name tba">미정</span>`}
        </div>
        <div class="teacher-row sub">
          <span class="label">부담임</span>
          ${sub
            ? `<span class="name">${escapeHtml(sub)}</span>`
            : `<span class="name tba">미정</span>`}
        </div>
      </div>
      <div class="members">
        <div class="members-title">학생 명단</div>
        <div class="member-list">${sorted.map(memberHtml).join('')}</div>
      </div>
    </div>
  `;
}

function specialHtml(special) {
  if (!special || !special.students || special.students.length === 0) return '';
  const sorted = special.students.slice().sort((a, b) => {
    if (a.grade !== b.grade) return b.grade - a.grade;
    return a.name.localeCompare(b.name, 'ko');
  });
  return `
    <div class="special-card">
      <div class="special-head">
        <span class="special-tag">SPECIAL</span>
        <span class="special-name">${escapeHtml(special.name)}</span>
        <span class="special-meta">${special.students.length}명</span>
      </div>
      <div class="special-note">목회자 · 별도 교사가 특별 케어 (장기결석자 회복 그룹)</div>
      <div class="member-list">${sorted.map(memberHtml).join('')}</div>
    </div>
  `;
}

function familyHtml(family) {
  const familyId = family.name.replace(/\s/g,'');
  const regularCount = family.cells.reduce((sum, c) => sum + c.students.length, 0);
  const specialCount = family.special ? family.special.students.length : 0;
  const total = regularCount + specialCount;
  const leader = FAMILY_LEADERS[familyId];
  const helper = FAMILY_HELPERS[familyId];
  const metaParts = [`${family.cells.length}개 소그룹반`];
  if (family.special) metaParts.push(`Special 1개`);
  metaParts.push(`총 ${total}명`);
  return `
    <section class="family-section">
      <div class="family-header">
        <div class="family-title">
          <span class="family-icon">👨‍👩‍👧‍👦</span>
          <span class="family-name">${escapeHtml(family.name)}</span>
          <span class="family-meta">${metaParts.join(' · ')}</span>
        </div>
        ${leader ? `
          <div class="family-role-row">
            <span class="role-label leader">🌟 대가족장</span>
            <span class="role-name">${escapeHtml(leader.name)}</span>
            <span class="role-note">(${escapeHtml(leader.from)} 담임 겸임)</span>
          </div>
        ` : ''}
        ${helper ? `
          <div class="family-role-row">
            <span class="role-label helper">🤝 헬퍼</span>
            <span class="role-name">${escapeHtml(helper)}</span>
            <span class="role-note">(대가족반 공통)</span>
          </div>
        ` : ''}
      </div>
      <div class="cell-grid">${family.cells.map(c => cellHtml(c, familyId)).join('')}</div>
      ${specialHtml(family.special)}
    </section>
  `;
}

  FAMILY_GROUPS.map(familyHtml).join('');
