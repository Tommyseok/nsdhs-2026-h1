<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>내수동 고등부 — 비공개로 전환됨</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(135deg, #0b0f17 0%, #1e1b3a 100%);
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    max-width: 460px; width: 100%;
    background: #1e293b;
    border: 1px solid #475569;
    border-radius: 14px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .lock { font-size: 48px; margin-bottom: 16px; }
  h1 { margin: 0 0 12px; font-size: 20px; color: #f1f5f9; }
  p  { margin: 0 0 10px; font-size: 14px; color: #cbd5e1; line-height: 1.6; }
  .muted { color: #94a3b8; font-size: 12px; margin-top: 18px; }
  .btn-row { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  a.btn {
    background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
    color: #fff; text-decoration: none;
    padding: 11px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 700;
    display: inline-block;
  }
  a.btn.secondary {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15);
    color: #cbd5e1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>이 페이지는 비공개로 전환되었습니다</h1>
    <p>부담임 지원 페이지는 더 이상 공개되지 않습니다.<br>학생 개인정보 보호 정책에 따라 접근이 제한됩니다.</p>
    <p>교사·사역자는 교사용 비공개 페이지에서 동일 정보를 확인할 수 있습니다.</p>
    <div class="btn-row">
      <a class="btn" href="teachers.html">🔐 교사용 비공개 페이지로 이동</a>
      <a class="btn secondary" href="assignments.html">🌱 공개용 편성표 (학생·학부모)</a>
    </div>
    <div class="muted">내수동교회 고등부</div>
  </div>
</body>
</html>
