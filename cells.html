const root = document.getElementById('root');

function gradeBadgeClass(grade) {
  if (!grade) return '';
  const map = {
    '1남':'b-1남','1여':'b-1여',
    '2남':'b-2남','2여':'b-2여',
    '3남':'b-3남','3여':'b-3여'
  };
  return map[grade] || '';
}
function roleBadgeClass(role) {
  if (!role) return 'b-role-강';
  if (role.includes('약⭐⭐')) return 'b-role-약⭐⭐';
  if (role.includes('약⭐')) return 'b-role-약⭐';
  if (role.includes('약💡')) return 'b-role-약💡';
  if (role.includes('약')) return 'b-role-약';
  if (role.includes('강')) return 'b-role-강';
  if (role.includes('중')) return 'b-role-중';
  if (role.includes('신규')) return 'b-role-신규';
  if (role.includes('장결') || role.includes('시급')) return 'b-role-장결';
  return 'b-role-강';
}

function memberHtml(m, idPrefix) {
  const id = idPrefix + '-' + m.name.replace(/\s/g,'');
  return `
    <div class="member">
      <div class="member-head" onclick="toggleDetail('${id}')">
        <span class="member-name">${m.name}</span>
        <span class="badge ${gradeBadgeClass(m.grade)}">${m.grade}</span>
        <span class="badge ${roleBadgeClass(m.role)}">${m.role}</span>
        <span class="badge b-att">${m.att}</span>
        <span class="toggle-icon">▾</span>
      </div>
      ${m.memo ? `<div class="memo">${m.memo}</div>` : ''}
      <div class="member-detail" id="detail-${id}">
        <div class="field">
          <div class="label">26년 1학기 담임·부담임</div>
          <div class="value">${m.teacher || '—'}</div>
        </div>
        <div class="field">
          <div class="label">세부 상황 (가족·학교·특성)</div>
          <div class="value">${m.detail || '—'}</div>
        </div>
      </div>
    </div>
  `;
}

function cellHtml(cell, groupId) {
  const cellId = cell.name.replace(/\s/g,'');
  const idPrefix = `g${groupId}-${cellId}`;
  const savedT = localStorage.getItem(`apply-${cellId}-담임`) || '';
  const savedA = localStorage.getItem(`apply-${cellId}-부담임`) || '';
  return `
    <div class="cell-card ${cell.star ? 'star-cell' : ''}">
      <div class="cell-header">
        <div class="cell-name">${cell.name} <span style="font-weight:400;color:#94a3b8;">(${cell.count}명)</span></div>
        <div class="cell-intent">${cell.intent}</div>
      </div>
      <div>
        ${cell.members.map(m => memberHtml(m, idPrefix)).join('')}
      </div>
      <div class="apply-form">
        <div style="font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:600;">📝 교사 신청 (이 셀의 담임/부담임이 되고 싶으신 분 이름)</div>
        <div class="row">
          <label>담임</label>
          <input type="text" placeholder="담임 신청자 이름" value="${savedT}"
                 onblur="saveApply('${cellId}', '담임', this.value)">
        </div>
        <div class="row">
          <label>부담임</label>
          <input type="text" placeholder="부담임 신청자 이름 (선택)" value="${savedA}"
                 onblur="saveApply('${cellId}', '부담임', this.value)">
        </div>
      </div>
    </div>
  `;
}

function groupHtml(group) {
  return `
    <div class="group-title">📁 ${group.title}</div>
    <div class="cell-grid">
      ${group.cells.map(c => cellHtml(c, group.id)).join('')}
    </div>
  `;
}

function poolHtml(pool) {
  const idPrefix = 'pool-' + pool.title.substring(0,10).replace(/\s/g,'');
  return `
    <div class="pool-card">
      <div class="pool-title">${pool.title}</div>
      <div class="pool-caption">${pool.caption}</div>
      <div>
        ${pool.members.map(m => memberHtml(m, idPrefix)).join('')}
      </div>
    </div>
  `;
}

function exitHtml(exitList) {
  return `
    <div class="exit-card">
      <div class="pool-title" style="color:#fca5a5;">⛔ 이탈 학생 (편성 제외) ${exitList.length}명</div>
      <div class="pool-caption" style="color:#fca5a5;">교회 떠남 또는 타교회 이동. 명단만 기록·이력 보존.</div>
      <div>
        ${exitList.map(m => `
          <div class="member">
            <div class="member-head" onclick="toggleDetail('exit-${m.name}')">
              <span class="member-name">${m.name}</span>
              <span class="badge ${gradeBadgeClass(m.grade)}">${m.grade}</span>
              <span class="badge b-role-장결">${m.reason}</span>
              <span class="toggle-icon">▾</span>
            </div>
            <div class="member-detail" id="detail-exit-${m.name}">
              <div class="field">
                <div class="label">26년 1학기 담임·부담임</div>
                <div class="value">${m.teacher || '—'}</div>
              </div>
              <div class="field">
                <div class="label">세부 상황</div>
                <div class="value">${m.detail || '—'}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function principlesHtml() {
  return `
    <div class="principles-card">
      <h2>🌱 운영 원칙</h2>
      <ul>
        <li><b>담임·부담임</b>: 위 각 셀 하단 입력란에 이름 적기 (자동 저장)</li>
        <li><b>장결자 관리 4단계 (무응답 시)</b>: Week 1 친구들(셀 코어) 카톡 → Week 2 담임 연락 → Week 3 교육국장 (성년부 학생은 부모에게) → Week 4 담당 목회자</li>
        <li><b>대학부 형제자매 연결</b>: 송준원↔송예원(누나) · 이서현↔이지환(오빠) · 이준호↔이준성(형) → 목회자 / 담당리더와 협조</li>
        <li><b>성년부 경우 (부모)</b>: 부모님이 성년부 출석하는 경우 (파악 필요) → 교육국장이 성년부 경유</li>
        <li><b>별도 풀 운영</b>: 주 1회 명단 점검 + 가족 연락. 회복 신호 시 정규 셀로 이동</li>
      </ul>
    </div>
  `;
}

// 렌더링 실행
root.innerHTML =
  data.groups.map(groupHtml).join('') +
  `<div class="group-title">🟧 장결자 특별관리 <span style="font-size:13px;font-weight:400;color:#94a3b8">(추후 각 반에 분산배치 하되, 목회자 + 별도 교사가 특별관리)</span></div>` +
  data.pools.map(poolHtml).join('') +
  exitHtml(data.exits) +
  principlesHtml();

/* ========== 인터랙션 ========== */
function toggleDetail(id) {
  const el = document.getElementById('detail-' + id);
  if (!el) return;
  el.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.member-detail').forEach(el => el.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.member-detail').forEach(el => el.classList.remove('open'));
}

function saveApply(cellId, role, value) {
  const key = `apply-${cellId}-${role}`;
  if (value && value.trim()) {
    localStorage.setItem(key, value.trim());
    showToast(`${cellId} ${role} 저장: ${value.trim()}`);
  } else {
    localStorage.removeItem(key);
  }
}

function showApplications() {
  const out = document.getElementById('applyOutput');
  const lines = ['📋 셀편성 교사 신청 내역 (' + new Date().toLocaleDateString('ko-KR') + ')\n'];
  data.groups.forEach(group => {
    lines.push(`\n[${group.title}]`);
    group.cells.forEach(c => {
      const cellId = c.name.replace(/\s/g,'');
      const t = localStorage.getItem(`apply-${cellId}-담임`) || '(없음)';
      const a = localStorage.getItem(`apply-${cellId}-부담임`) || '(없음)';
      lines.push(`${c.name} [${c.intent}] — 담임: ${t} / 부담임: ${a}`);
    });
  });
  out.value = lines.join('\n');
  out.style.display = 'block';
  out.scrollIntoView({behavior:'smooth', block:'center'});
}

async function copyApplications() {
  showApplications();
  const out = document.getElementById('applyOutput');
  try {
    await navigator.clipboard.writeText(out.value);
    showToast('📋 클립보드에 복사됨! 카톡에 붙여넣으세요.');
  } catch (e) {
    out.select();
    document.execCommand('copy');
    showToast('📋 복사 시도. 카톡에 붙여넣으세요.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
