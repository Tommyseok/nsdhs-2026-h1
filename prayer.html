<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="logo-runner.svg">
<title>Runners 2026 · 학생상황·기도</title>
<style>
  :root {
    --bg: #0b0f17; --card: #1e293b; --border: #334155;
    --text: #e5e7eb; --muted: #94a3b8;
    --accent: #a78bfa; --accent2: #7c3aed;
    --ok: #10b981; --warn: #f59e0b; --danger: #ef4444; --share: #ec4899;
    --teacher: #38bdf8; --family: #c084fc;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: none; }
  body {
    margin: 0; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background: linear-gradient(180deg, #0b0f17 0%, #0a0d14 100%);
    color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
    line-height: 1.55; font-size: 15px; min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }

  /* Gate */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #0b0f17 0%, #1e1b3a 100%); }
  .gate-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px 26px; max-width: 380px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
  .gate-card .lock { font-size: 44px; margin-bottom: 14px; }
  .gate-card h1 { margin: 0 0 6px; font-size: 18px; color: #f1f5f9; }
  .gate-card .gate-sub { margin: 0 0 22px; font-size: 13px; color: var(--muted); }
  .gate-card input, .gate-card select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; margin-bottom: 12px; text-align: center; }
  .gate-card button { width: 100%; background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .gate-card .gate-err { color: #fca5a5; font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* Header */
  header {
    background: linear-gradient(135deg, #1e1b3a 0%, #312e81 100%);
    padding: 14px 0; border-bottom: 2px solid var(--accent);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { margin: 0; font-size: 17px; color: #f1f5f9; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  header h1 .my-cell {
    background: rgba(167,139,250,.2); color: #c4b5fd;
    font-size: 12px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid rgba(167,139,250,.4); font-weight: 700;
  }
  header h1 .my-fam {
    background: rgba(192,132,252,.2); color: var(--family);
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid rgba(192,132,252,.4); font-weight: 700;
  }
  .back-link {
    color: #cbd5e1; text-decoration: none;
    background: rgba(255,255,255,.06); padding: 6px 12px;
    border-radius: 999px; font-size: 12px; font-weight: 700;
    border: 1px solid rgba(255,255,255,.12);
  }

  /* Tabs */
  .tab-bar {
    display: flex; gap: 4px; margin-top: 14px;
    background: var(--card); border: 1px solid var(--border);
    padding: 4px; border-radius: 12px; overflow-x: auto;
  }
  .tab-btn {
    flex: 1; min-width: 100px; background: transparent;
    border: none; color: var(--muted); padding: 10px 8px;
    border-radius: 9px; font-size: 12.5px; font-weight: 700;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #fff; box-shadow: 0 4px 10px rgba(124,58,237,.4);
  }

  /* New prayer form */
  .new-prayer {
    margin-top: 16px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px; padding: 16px;
  }
  .new-prayer h2 {
    margin: 0 0 12px; font-size: 15px; font-weight: 800; color: #f1f5f9;
    display: flex; align-items: center; gap: 6px;
  }
  .form-row { margin-bottom: 10px; }
  .form-label {
    display: block; font-size: 11px; color: var(--muted);
    font-weight: 700; margin-bottom: 4px; letter-spacing: 0.3px;
  }
  .type-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .type-btn {
    background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.1);
    color: #cbd5e1; padding: 10px; border-radius: 8px;
    font-size: 13.5px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .type-btn.active {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #fff; border-color: var(--accent);
  }
  .form-row select, .form-row textarea {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical;
  }
  .form-row textarea { min-height: 80px; }
  .toggle-row {
    display: flex; gap: 8px; align-items: center;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; cursor: pointer;
  }
  .toggle-row input[type=checkbox] { width: auto; margin: 0; }
  .toggle-row .toggle-text { flex: 1; font-size: 13.5px; color: var(--text); }
  .toggle-row .toggle-text .toggle-hint {
    display: block; font-size: 11.5px; color: var(--muted); margin-top: 2px;
  }
  .share-row .toggle-row {
    background: rgba(236,72,153,.08); border-color: rgba(236,72,153,.3);
  }
  .share-row .toggle-row.checked {
    background: rgba(236,72,153,.15); border-color: var(--share);
  }
  .urgent-row .toggle-row {
    background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.3);
  }
  .urgent-row .toggle-row.checked {
    background: rgba(239,68,68,.15); border-color: var(--danger);
  }
  .form-actions { display: flex; gap: 8px; margin-top: 14px; }
  .form-actions button {
    flex: 1; border: none; padding: 12px;
    border-radius: 8px; font-size: 14px; font-weight: 800;
    cursor: pointer; font-family: inherit;
  }
  .form-actions .add {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #fff;
  }
  .form-actions .clear {
    background: rgba(255,255,255,.06); color: #cbd5e1; flex: 0 0 80px;
  }

  /* Prayer cards */
  .prayer-list { margin-top: 14px; }
  .prayer-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .prayer-card.shared { border-color: rgba(236,72,153,.4); }
  .prayer-card.urgent { border-color: rgba(239,68,68,.5); }
  .prayer-card.teacher { border-color: rgba(56,189,248,.35); background: rgba(56,189,248,.04); }
  .prayer-head {
    display: flex; align-items: baseline; gap: 8px;
    flex-wrap: wrap; margin-bottom: 8px;
  }
  .prayer-student { font-weight: 800; color: #f1f5f9; font-size: 15px; }
  .prayer-source {
    font-size: 11px; color: var(--muted);
    background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 4px;
  }
  .prayer-date { margin-left: auto; font-size: 11px; color: var(--muted); }
  .prayer-text {
    font-size: 13.5px; color: #cbd5e1;
    line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap;
  }
  .prayer-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .tag {
    font-size: 10.5px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
  }
  .tag.share { background: rgba(236,72,153,.15); color: #fbcfe8; border: 1px solid rgba(236,72,153,.35); }
  .tag.urgent { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.35); }
  .tag.mine { background: rgba(167,139,250,.15); color: #c4b5fd; border: 1px solid rgba(167,139,250,.35); }
  .tag.teacher { background: rgba(56,189,248,.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,.35); }
  .tag.family { background: rgba(192,132,252,.15); color: #d8b4fe; border: 1px solid rgba(192,132,252,.35); }
  .prayer-actions {
    display: flex; gap: 6px;
    border-top: 1px solid rgba(255,255,255,.06); padding-top: 10px;
  }
  .prayer-actions button {
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    color: #cbd5e1; padding: 6px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .prayer-actions button.delete { color: #fca5a5; border-color: rgba(239,68,68,.25); }
  .prayer-actions button.toggle-share { color: #fbcfe8; border-color: rgba(236,72,153,.3); }
  .prayer-actions button.toggle-share.on { background: rgba(236,72,153,.18); }
  .prayer-actions button.copy { color: #fde68a; border-color: rgba(245,158,11,.3); }

  /* Timeline view */
  .timeline {
    margin-top: 14px;
    position: relative;
    padding-left: 18px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 6px; top: 4px; bottom: 4px;
    width: 2px;
    background: rgba(167,139,250,.3);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 14px;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -18px; top: 18px;
    width: 12px; height: 12px;
    background: var(--accent2);
    border: 2px solid var(--bg);
    border-radius: 50%;
  }
  .timeline-item .timeline-date {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .timeline-group {
    font-size: 12px;
    color: var(--muted);
    margin: 18px 0 10px;
    padding: 6px 12px;
    background: rgba(167,139,250,.06);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-weight: 700;
  }
  .filter-bar {
    margin-top: 14px;
    display: flex; gap: 6px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    padding: 8px; border-radius: 10px;
  }
  .filter-btn {
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    color: var(--muted); padding: 6px 12px;
    border-radius: 999px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .filter-btn.active {
    background: rgba(167,139,250,.18); color: #c4b5fd;
    border-color: rgba(167,139,250,.4);
  }

  .empty {
    text-align: center; padding: 30px 20px;
    color: var(--muted); font-size: 13.5px; font-style: italic;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(16,185,129,.95); color: #fff;
    padding: 12px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.pink { background: rgba(236,72,153,.95); }
  .toast.orange { background: rgba(245,158,11,.95); }

  /* 학생 선택기 */
  .student-picker {
    margin-top: 14px;
  }
  .student-picker input[type=search] {
    width: 100%;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 12px;
  }
  .student-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }
  .student-tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: inherit;
    color: var(--text);
  }
  .student-tile:hover {
    border-color: var(--accent);
    background: rgba(167,139,250,.08);
    transform: translateY(-1px);
  }
  .student-tile.active {
    background: rgba(167,139,250,.15);
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(124,58,237,.3);
  }
  .student-tile .st-name {
    font-size: 14px;
    font-weight: 800;
    color: #f1f5f9;
    margin-bottom: 4px;
  }
  .student-tile .st-meta {
    font-size: 10.5px;
    color: var(--muted);
  }
  .student-tile .st-count {
    margin-top: 4px;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 999px;
    display: inline-block;
  }
  .student-tile .st-count.has {
    background: rgba(167,139,250,.18);
    color: #c4b5fd;
  }
  .student-tile .st-count.zero {
    background: rgba(148,163,184,.1);
    color: var(--muted);
  }
  .picked-student {
    margin-top: 14px;
    padding: 14px 16px;
    background: linear-gradient(135deg, rgba(167,139,250,.12) 0%, rgba(124,58,237,.06) 100%);
    border: 1px solid rgba(167,139,250,.3);
    border-radius: 12px;
  }
  .picked-student .ps-name {
    font-size: 17px;
    font-weight: 800;
    color: #f1f5f9;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .picked-student .ps-back {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    color: #cbd5e1;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-left: auto;
  }
  .picked-student .ps-att {
    margin-top: 8px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 12px;
    color: #cbd5e1;
  }
  .picked-student .ps-att .ps-stat {
    background: rgba(255,255,255,.04);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .picked-student .ps-att .stat-num {
    font-weight: 800;
    color: #f1f5f9;
  }

  /* 시계열 */
  .timeline {
    margin-top: 14px;
    position: relative;
    padding-left: 18px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 6px; top: 4px; bottom: 4px;
    width: 2px;
    background: rgba(167,139,250,.3);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 14px;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -18px; top: 18px;
    width: 12px; height: 12px;
    background: var(--accent2);
    border: 2px solid var(--bg);
    border-radius: 50%;
  }
  .timeline-group {
    font-size: 12px;
    color: var(--muted);
    margin: 18px 0 10px;
    padding: 6px 12px;
    background: rgba(167,139,250,.06);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- Gate -->
<div id="gate-root">
  <div class="gate">
    <div class="gate-card">
      <div class="lock"><img src="logo-runner.svg" alt="Runners" style="width:62px;height:62px;border-radius:16px;box-shadow:0 8px 24px rgba(124,58,237,.4)"></div>
      <div style="text-align:center;font-weight:800;letter-spacing:1px;color:#c4b5fd;font-size:13px;margin-bottom:10px">RUNNERS 2026</div>
      <h1>학생상황+기도제목</h1>
      <p class="gate-sub">학생 상황 · 기도제목 · 대가족 공유</p>
      <input id="pin-input" type="password" placeholder="🔑 접근 코드" autocomplete="off" style="letter-spacing: 2px;">
      <select id="teacher-select"></select>
      <button onclick="login()">접속</button>
      <div class="gate-err" id="gate-err"></div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app-root" style="display:none">
  <header>
    <div class="container" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <h1>
        <span id="my-name">…</span>
        <span id="my-cell-badge" class="my-cell"></span>
        <span id="my-fam-badge" class="my-fam"></span>
      </h1>
      <a class="back-link" href="dashboard.html">🏠 Home</a>
    </div>
  </header>

  <div class="container">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="mine" onclick="switchTab('mine')">📝 우리 셀</button>
      <button class="tab-btn" data-tab="family" onclick="switchTab('family')">👨‍👩‍👧 우리 대가족</button>
      <button class="tab-btn" data-tab="byStudent" onclick="switchTab('byStudent')">🔍 학생별 모아보기</button>
    </div>

    <!-- 새 학생상황+기도제목 폼 (mine 탭에서만) -->
    <div class="new-prayer" id="new-prayer">
      <h2>+ 새 학생상황 · 기도제목 추가</h2>
      <div class="form-row">
        <label class="form-label">📋 종류</label>
        <div class="type-row">
          <button type="button" class="type-btn active" id="type-student" onclick="setType('student')">👤 학생 상황·기도</button>
          <button type="button" class="type-btn" id="type-teacher" onclick="setType('teacher')">🧑 내 개인 기도</button>
        </div>
      </div>
      <div class="form-row" id="student-row">
        <label class="form-label">👤 학생</label>
        <select id="form-student"></select>
      </div>
      <div class="form-row">
        <label class="form-label">📝 상황 · 기도 내용</label>
        <textarea id="form-content" placeholder="예: 가정 형편, 신앙 갈등, 학업/진로 상황, 출석 패턴 변화, 기도 부탁 등"></textarea>
      </div>
      <div class="form-row share-row">
        <label class="toggle-row" id="form-share-row">
          <input type="checkbox" id="form-share" onchange="toggleShareUi()">
          <span class="toggle-text">
            🌸 전체 공유 (선택)
            <span class="toggle-hint">체크하면 전체 선생님 대시보드에도 노출 (대가족 공유는 기본)</span>
          </span>
        </label>
      </div>
      <div class="form-row urgent-row">
        <label class="toggle-row" id="form-urgent-row">
          <input type="checkbox" id="form-urgent" onchange="toggleUrgentUi()">
          <span class="toggle-text">
            🚨 긴급
            <span class="toggle-hint">대시보드에 빨강 박스로 강조</span>
          </span>
        </label>
      </div>
      <div class="form-actions">
        <button class="clear" onclick="clearForm()">취소</button>
        <button class="add" onclick="addPrayer()">+ 추가</button>
      </div>
    </div>

    <!-- 학생별 모아보기 - 학생 선택기 -->
    <div class="student-picker" id="student-picker" style="display:none">
      <input type="search" id="student-search" placeholder="🔍 학생 이름으로 검색..." oninput="renderStudentPicker()">
      <div class="student-grid" id="student-grid"></div>
    </div>

    <!-- 학생별 모아보기 - 선택된 학생 헤더 -->
    <div class="picked-student" id="picked-student" style="display:none"></div>

    <div class="prayer-list" id="prayer-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 * 학생 사진 헬퍼 (Supabase Storage, SDK 없이 REST · 표시 전용)
 *    업로드는 dashboard '내 반' 뷰에서. 여기선 이름 옆 아바타 표시만.
 * ============================================================ */
const Photos = (function () {
  const URL_BASE = 'https://hycwzggbgnimuuhporwf.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5Y3d6Z2diZ25pbXV1aHBvcndmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTQzMTAsImV4cCI6MjA5NDAzMDMxMH0.NeypbxUYf5xoBagDBUPvhit3UOp6k_-_SN32JGgbEJg';

      : `<div style="font-size:11.5px;color:#fca5a5;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);padding:8px 12px;border-radius:8px;margin-bottom:10px">담당 셀이 없어 학생을 조회할 수 없습니다.</div>`;

  if (filtered.length === 0) {
    grid.innerHTML = scopeBanner + '<div class="empty">검색 결과 없음</div>';
    return;
  }
  grid.innerHTML = scopeBanner + filtered.map(s => {
    const n = counts[s.name] || 0;
    return `
      <button class="student-tile ${PICKED_STUDENT === s.name ? 'active' : ''}" onclick="pickStudent('${s.name}')">
        <div style="display:flex;justify-content:center;margin-bottom:6px">${Photos.avatarImg(s.name, STUDENT_GENDER[s.name], 42)}</div>
        <div class="st-name">${escapeHtml(s.name)}</div>
        <div class="st-meta">${escapeHtml(s.cell)}</div>
        <span class="st-count ${n > 0 ? 'has' : 'zero'}">${n}건</span>
      </button>
    `;
  }).join('');
}

/* ===== 렌더링 ===== */
function fillStudentSelect() {
  if (!MY || !MY.cell) return;
  const sel = document.getElementById('form-student');
  const students = CELL_STUDENTS[MY.cell] || [];
  sel.innerHTML = '<option value="">— 학생 선택 —</option>' +
    students.map(s => `<option value="${s}">${s}</option>`).join('');
}

function allPrayers() {
  // 본인 localStorage + 시트(다른 선생님 공유)
  const local = loadPrayers();
  const shared = (SHARED_PRAYERS || []).map(p => ({
    id: p.id,
    date: p.date,
    type: p.type || 'student',
    student: p.student,
    cell: p.cell,
    family: p.family || CELL_FAMILY[p.cell] || null,
    author: p.teacher,
    content: p.text,
    share: !!p.share,
    urgent: !!p.urgent,
    fromGithub: true,
  }));
  // 중복 제거 (같은 ID)
  const map = new Map();
  [...local, ...shared].forEach(p => {
    if (!map.has(p.id)) map.set(p.id, p);
  });
  return [...map.values()];
}

function prayerCardHtml(p, opts={}) {
  const isMine = p.author === MY.name && !p.fromGithub;
  const isTeacherPrayer = p.type === 'teacher';
  const cardCls = (p.share ? 'shared ' : '') + (p.urgent ? 'urgent ' : '') + (isTeacherPrayer ? 'teacher' : '');
  return `
    <div class="prayer-card ${cardCls}">
      <div class="prayer-head">
        <span class="prayer-student">${p.urgent ? '🚨 ' : ''}${isTeacherPrayer ? '🧑 ' : ''}${escapeHtml(p.student)}</span>
        <span class="prayer-source">${escapeHtml(p.cell || '')}${p.author ? ` · ${escapeHtml(p.author)}T` : ''}</span>
        <span class="prayer-date">${escapeHtml((p.date||'').substring(5))}</span>
      </div>
      <div class="prayer-text">${escapeHtml(p.content)}</div>
      <div class="prayer-tags">
        ${isTeacherPrayer ? '<span class="tag teacher">🧑 선생님 본인</span>' : ''}
        ${p.share ? '<span class="tag share">🌸 전체 공유</span>' : ''}
        ${p.urgent ? '<span class="tag urgent">🚨 긴급</span>' : ''}
        ${p.family ? `<span class="tag family">👨‍👩 대가족 ${p.family}</span>` : ''}
        ${isMine ? '<span class="tag mine">내가 등록</span>' : ''}
      </div>
      ${isMine ? `
        <div class="prayer-actions">
          <button class="toggle-share ${p.share ? 'on' : ''}" onclick="toggleShare('${p.id}')">${p.share ? '🌸 전체 공유 ON' : '🌸 전체 공유'}</button>
          <button class="delete" onclick="deletePrayer('${p.id}')">🗑 삭제</button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderPrayers() {
  if (!MY) return;
  const all = allPrayers();
  const myFam = myFamily(MY);
  const famCells = myFam ? familyCells(myFam) : [];
  let items;
  const list = document.getElementById('prayer-list');
  const pickedEl = document.getElementById('picked-student');
  const pickerEl = document.getElementById('student-picker');

  if (CURRENT_TAB === 'mine') {
    pickerEl.style.display = 'none';
    pickedEl.style.display = 'none';
    items = all.filter(p =>
      p.cell === MY.cell || (p.type === 'teacher' && p.author === MY.name)
    );
  } else if (CURRENT_TAB === 'family') {
    pickerEl.style.display = 'none';
    pickedEl.style.display = 'none';
    items = all.filter(p =>
      famCells.includes(p.cell) ||
      (p.type === 'teacher' && TEACHERS.find(t => t.name === p.author && CELL_FAMILY[t.cell] === myFam))
    );
  } else if (CURRENT_TAB === 'byStudent') {
    // 학생별 모아보기
    if (!PICKED_STUDENT) {
      pickerEl.style.display = '';
      pickedEl.style.display = 'none';
      renderStudentPicker();
      list.innerHTML = '<div class="empty">위에서 학생을 선택하면 시계열로 모아 보입니다.</div>';
      return;
    }
    pickerEl.style.display = 'none';
    pickedEl.style.display = '';
    items = all.filter(p => p.student === PICKED_STUDENT && p.type !== 'teacher');
    items.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    // 선택된 학생 헤더
    const stInfo = ALL_STUDENTS_FLAT.find(s => s.name === PICKED_STUDENT);
    const famNum = stInfo ? CELL_FAMILY[stInfo.cell] : null;
    const cumRate = getCumulativeRate(PICKED_STUDENT);
    pickedEl.innerHTML = `
      <div class="ps-name">
        ${Photos.avatarImg(PICKED_STUDENT, STUDENT_GENDER[PICKED_STUDENT], 40)} ${escapeHtml(PICKED_STUDENT)}
        ${stInfo ? `<span style="font-size:12px;color:#c4b5fd;background:rgba(167,139,250,.18);padding:3px 10px;border-radius:999px;border:1px solid rgba(167,139,250,.35)">${escapeHtml(stInfo.cell)} · 대가족 ${famNum}</span>` : ''}
        <button class="ps-back" onclick="unpickStudent()">← 학생 선택으로</button>
      </div>
      <div class="ps-att">
        <span class="ps-stat">총 기록 <span class="stat-num">${items.length}</span>건</span>
        ${cumRate !== null ? `<span class="ps-stat">누적 출석률 <span class="stat-num">${cumRate}%</span></span>` : ''}
      </div>
    `;
  }

  if (!items || items.length === 0) {
    if (CURRENT_TAB === 'byStudent') {
      list.innerHTML = '<div class="empty">이 학생의 기록이 아직 없습니다.<br>우리 셀 탭에서 추가해 주세요.</div>';
    } else {
      const emptyMsg = CURRENT_TAB === 'mine'
        ? '아직 등록된 학생상황·기도제목이 없습니다. 위에서 추가해 주세요.'
        : '우리 대가족 기록이 없습니다.';
      list.innerHTML = `<div class="empty">${emptyMsg}</div>`;
    }
    return;
  }

  if (CURRENT_TAB === 'byStudent') {
    // 시계열 표시
    let html = '<div class="timeline">';
    let lastDate = '';
    items.forEach(p => {
      if (p.date !== lastDate) {
        html += `<div class="timeline-group">📅 ${escapeHtml(p.date || '날짜 없음')}</div>`;
        lastDate = p.date;
      }
      html += `<div class="timeline-item">${prayerCardHtml(p)}</div>`;
    });
    html += '</div>';
    list.innerHTML = html;
  } else {
    // 최신순 정렬
    items.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    list.innerHTML = items.map(p => prayerCardHtml(p)).join('');
  }
}

// 학생 누적 출석률 (1학기 historical + 2학기 localStorage)
function getCumulativeRate(name) {
  const HIST_LEN = 21;
  let total = 0, sum = 0;
  // 1학기 historical 데이터는 attendance.html에 있는 것과 동일 — 여기선 localStorage 만 사용
  try {
    const userData = JSON.parse(localStorage.getItem('attendance_data') || '{}');
    Object.keys(userData).forEach(w => {
      const rec = userData[w][name];
      if (!rec || !rec.status) return;
      total++;
      if (rec.status === 'full') sum++;
      else if (rec.status === 'partial') sum += 0.5;
    });
  } catch {}
  if (total === 0) return null;
  return Math.round(sum / total * 100);
}

function switchTab(tab) {
  if (CURRENT_TAB === tab) return;
  CURRENT_TAB = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-tab') === tab);
  });
  document.getElementById('new-prayer').style.display = tab === 'mine' ? '' : 'none';
  if (tab !== 'byStudent') PICKED_STUDENT = null;
  renderPrayers();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
