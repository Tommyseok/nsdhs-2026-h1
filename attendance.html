<title>출석 입력 · 내수동 고등부 · 2026 2학기</title>
<style>
  :root {
    --bg: #0b0f17;
    --card: #1e293b;
    --border: #334155;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --ok: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: none; }
  body {
    margin: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background: linear-gradient(180deg, #0b0f17 0%, #0a0d14 100%);

    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
    line-height: 1.55;
    font-size: 15px;
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 16px; }

  /* Gate */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #0b0f17 0%, #1e1b3a 100%); }
  .gate-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px 26px; max-width: 380px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
  .gate-card .lock { font-size: 44px; margin-bottom: 14px; }
  .gate-card h1 { margin: 0 0 6px; font-size: 18px; color: #f1f5f9; }
  .gate-card .gate-sub { margin: 0 0 22px; font-size: 13px; color: var(--muted); }
  .gate-card input, .gate-card select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; margin-bottom: 12px; text-align: center; }
  .gate-card button { width: 100%; background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .gate-card .gate-err { color: #fca5a5; font-size: 12px; margin-top: 10px; min-height: 16px; }

    background: linear-gradient(135deg, #1e1b3a 0%, #312e81 100%);

    border-bottom: 2px solid var(--accent);

    top: 0;
    z-index: 100;
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    color: #f1f5f9;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  header h1 .my-cell {
    background: rgba(167,139,250,.2);
    color: #c4b5fd;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid rgba(167,139,250,.4);
    font-weight: 700;
  }
  .back-link {
    color: #cbd5e1;
    text-decoration: none;
    background: rgba(255,255,255,.06);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,.12);
  }

  /* Week selector */
  .week-bar {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .week-bar button {
    background: rgba(167,139,250,.15);
    color: #c4b5fd;
    border: 1px solid rgba(167,139,250,.3);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .week-bar button:active { transform: scale(0.95); }
  .week-bar .week-info {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 800;
    color: #f1f5f9;
  }
  .week-bar .week-info .week-sub {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 1px;
  }
  .week-bar .week-info .today-mark {
    color: #6ee7b7;
    font-weight: 700;
    margin-left: 4px;
  }

  /* Summary */
  .summary {
    margin-top: 12px;
    background: rgba(167,139,250,.06);
    border: 1px solid rgba(167,139,250,.2);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 13px;
  }
  .summary .stat { color: #cbd5e1; }
  .summary .stat-num { font-weight: 800; color: #f1f5f9; font-size: 17px; margin-right: 2px; }
  .summary .stat-num.ok { color: #6ee7b7; }
  .summary .stat-num.partial { color: #fcd34d; }
  .summary .stat-num.miss { color: #fca5a5; }
  .summary .stat-num.pending { color: #94a3b8; }

  /* Student list */
  .student-list {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .student {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    transition: border-color 0.15s;
  }
  .student.selected { border-color: var(--accent); }
  .student-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;

  .student-name { font-size: 16px; font-weight: 800; color: #f1f5f9; }
  .student-meta {
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,.04);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .gender-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .gender-pill.male {
    color: #93c5fd;
    background: rgba(96,165,250,.12);
    border: 1px solid rgba(96,165,250,.35);
  }
  .gender-pill.female {
    color: #fbcfe8;
    background: rgba(244,114,182,.12);
    border: 1px solid rgba(244,114,182,.35);
  }
  .cum-rate {

    font-size: 11.5px;
    font-weight: 800;

  .status-btn {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    color: #94a3b8;

  .save-bar {

    bottom: 0;
    left: 0;
    right: 0;

  .save-bar button {

    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;

  .save-bar button.save {

    color: #fff;
    box-shadow: 0 6px 14px rgba(124,58,237,.4);
  }
  .save-bar button.cancel {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: #cbd5e1;
    flex: 0 0 100px;
  }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(16,185,129,.95);
    color: #fff;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .no-class {
    margin-top: 30px;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .no-class .icon { font-size: 40px; margin-bottom: 10px; }
  .no-class a { color: var(--accent); text-decoration: none; font-weight: 700; }
</style>
</head>

 * 상태

let MY = null;          // 본인 선생님 객체
let CURRENT_WEEK = null; // 'YYYY-MM-DD' 그 주의 일요일
let ATTENDANCE = {};    // { 'YYYY-MM-DD': { '학생명': {status, note} } }

/* =========================================================
 * 로그인
 * ========================================================= */
function fillSelect() {
  const sel = document.getElementById('teacher-select');
  sel.innerHTML = '<option value="">— 본인 선택 —</option>';
  TEACHERS.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = `${t.name} · ${t.cell} ${t.role}`;
    sel.appendChild(opt);
  });
  // 자동 복원
  const saved = localStorage.getItem('mock_teacher');
  if (saved) sel.value = saved;
}

function login() {
  const pin = (document.getElementById('pin-input').value || '').trim();
  const name = document.getElementById('teacher-select').value;
  const errEl = document.getElementById('gate-err');
  if (pin !== PRIVATE_KEY) { errEl.textContent = '❌ 접근 코드 불일치'; return; }
  if (!name) { errEl.textContent = '❌ 본인을 선택해 주세요'; return; }
  const me = TEACHERS.find(t => t.name === name);
  if (!me) { errEl.textContent = '❌ 알 수 없는 선생님'; return; }
  errEl.textContent = '';
  localStorage.setItem('mock_teacher', name);
  localStorage.setItem('access_pin', pin);
  MY = me;
  showApp();
}

/* =========================================================
 * 주차 관리
 * ========================================================= */
function getSundayOf(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function ymd(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtKor(d) {
  return `${d.getMonth()+1}/${d.getDate()} (${'일월화수목금토'[d.getDay()]})`;
}
function thisSunday() { return ymd(getSundayOf(new Date())); }

function prevWeek() {
  const d = new Date(CURRENT_WEEK + 'T00:00:00');
  d.setDate(d.getDate() - 7);
  CURRENT_WEEK = ymd(d);
  renderWeek();
}
function nextWeek() {
  const today = new Date();
  const next = new Date(CURRENT_WEEK + 'T00:00:00');
  next.setDate(next.getDate() + 7);
  if (next > today) return; // 미래 주차 안 보여줌
  CURRENT_WEEK = ymd(next);
  renderWeek();
}

/* =========================================================
 * Storage
 * ========================================================= */
function loadAttendance() {
  try {
    ATTENDANCE = JSON.parse(localStorage.getItem('attendance_data') || '{}');
  } catch { ATTENDANCE = {}; }
}
function persistAttendance() {
  localStorage.setItem('attendance_data', JSON.stringify(ATTENDANCE));
}

function setStatus(name, status) {
  if (!ATTENDANCE[CURRENT_WEEK]) ATTENDANCE[CURRENT_WEEK] = {};
  if (!ATTENDANCE[CURRENT_WEEK][name]) ATTENDANCE[CURRENT_WEEK][name] = {status:'', note:''};
  ATTENDANCE[CURRENT_WEEK][name].status = status;
  renderStudents();
}
function setNote(name, note) {
  if (!ATTENDANCE[CURRENT_WEEK]) ATTENDANCE[CURRENT_WEEK] = {};
  if (!ATTENDANCE[CURRENT_WEEK][name]) ATTENDANCE[CURRENT_WEEK][name] = {status:'', note:''};
  ATTENDANCE[CURRENT_WEEK][name].note = note;
  renderSummary();
}

/* =========================================================
 * 렌더링
 * ========================================================= */
function renderWeek() {
  const d = new Date(CURRENT_WEEK + 'T00:00:00');
  const label = document.getElementById('week-label');
  const sub = document.getElementById('week-sub');
  label.textContent = fmtKor(d);
  const today = new Date();
  today.setHours(0,0,0,0);
  if (ymd(d) === thisSunday()) label.innerHTML = fmtKor(d) + ' <span class="today-mark">· 이번 주</span>';
  sub.textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 셋째 주`;
  // 셋째 주 계산은 단순화 — 실제로는 정확하지 않으나 분위기용
  const diff = Math.round((d - getSundayOf(new Date())) / 86400000 / 7);
  if (diff === 0) sub.textContent = '오늘 주차';
  else if (diff < 0) sub.textContent = `${-diff}주 전`;
  else sub.textContent = `${diff}주 후`;
  renderStudents();
}

// 학생 누적 출석률 (전체 주차)
function cumulativeRate(name) {
  let total = 0, sum = 0;
  Object.keys(ATTENDANCE).forEach(w => {
    const rec = ATTENDANCE[w][name];
    if (!rec || !rec.status) return;
    total++;
    if (rec.status === 'full') sum++;
    else if (rec.status === 'partial') sum += 0.5;
  });
  if (total === 0) return null;
  return { rate: Math.round(sum / total * 100), total };
}

function renderStudents() {
  if (!MY || !MY.cell) return;
  const students = CELL_STUDENTS[MY.cell] || [];
  const sorted = students.slice().sort((a, b) => {
    const ga = (STUDENT_INFO[a]||{}).g||9, gb = (STUDENT_INFO[b]||{}).g||9;
    if (ga !== gb) return gb - ga;
    return a.localeCompare(b, 'ko');
  });
  const week = ATTENDANCE[CURRENT_WEEK] || {};
  const list = document.getElementById('student-list');
  list.innerHTML = sorted.map(name => {
    const info = STUDENT_INFO[name] || {g:'?', s:'?'};
    const rec = week[name] || {status:'', note:''};
    const gCls = info.s === '남' ? 'male' : 'female';
    const cum = cumulativeRate(name);
    let cumBadge = '';
    if (cum) {
      const cls = cum.rate >= 85 ? 'cum-ok' : cum.rate >= 50 ? 'cum-mid' : 'cum-low';
      cumBadge = `<span class="cum-rate ${cls}" title="누적 출석률 (전체 ${cum.total}주)">📊 ${cum.rate}%</span>`;
    }
    return `
      <div class="student ${rec.status ? 'selected' : ''} ${rec.note ? 'show-note' : ''}" data-name="${name}">
        <div class="student-head">
          <span class="student-name">${escapeHtml(name)}</span>
          <span class="gender-pill ${gCls}">${info.s}</span>
          <span class="student-meta">${info.g}학년</span>
          ${cumBadge}
        </div>
        <div class="status-row">
          <button class="status-btn full ${rec.status==='full'?'active':''}" onclick="setStatus('${name}','full')">● 전참</button>
          <button class="status-btn partial ${rec.status==='partial'?'active':''}" onclick="setStatus('${name}','partial')">◐ 부분</button>
          <button class="status-btn absent ${rec.status==='absent'?'active':''}" onclick="setStatus('${name}','absent')">○ 불참</button>
        </div>
        <textarea class="note-input" placeholder="결석 사유·메모 (선택)" oninput="setNote('${name}', this.value)">${escapeHtml(rec.note||'')}</textarea>
        ${rec.status==='absent' || rec.status==='partial' ? '' : ''}
      </div>
    `;
  }).join('');
  // absent/partial 일 때 자동으로 메모 입력 노출
  document.querySelectorAll('.student').forEach(el => {
    const name = el.getAttribute('data-name');
    const rec = week[name];
    if (rec && (rec.status === 'absent' || rec.status === 'partial')) {
      el.classList.add('show-note');
    }
  });
  renderSummary();
}

function renderSummary() {
  const students = CELL_STUDENTS[MY.cell] || [];
  const week = ATTENDANCE[CURRENT_WEEK] || {};
  let full=0, partial=0, absent=0, pending=0;
  students.forEach(s => {
    const st = (week[s]||{}).status;
    if (st === 'full') full++;
    else if (st === 'partial') partial++;
    else if (st === 'absent') absent++;
    else pending++;
  });
  document.getElementById('summary').innerHTML = `
    <span class="stat"><span class="stat-num">${students.length}</span>명</span>
    <span class="stat"><span class="stat-num ok">${full}</span>전참</span>
    <span class="stat"><span class="stat-num partial">${partial}</span>부분</span>
    <span class="stat"><span class="stat-num miss">${absent}</span>불참</span>
    ${pending > 0 ? `<span class="stat"><span class="stat-num pending">${pending}</span>미입력</span>` : ''}
  `;
}

function saveAttendance() {
  persistAttendance();
  showToast('💾 저장됨 — 브라우저에 임시 보관 중');
}

function resetAll() {
  if (!confirm('이번 주차 입력을 모두 지우시겠습니까?')) return;
  delete ATTENDANCE[CURRENT_WEEK];
  persistAttendance();
  renderStudents();
  showToast('이번 주차 입력 삭제');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
 * 진입
 * ========================================================= */
function showApp() {
  document.getElementById('gate-root').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  document.getElementById('my-name').textContent = MY.name + ' 선생님';
  if (MY.cell) {
    document.getElementById('my-cell-badge').textContent = MY.cell + ' · ' + MY.role;
  }
  if (!MY.cell || !CELL_STUDENTS[MY.cell]) {
    document.querySelector('.container .week-bar').style.display = 'none';
    document.getElementById('summary').style.display = 'none';
    document.querySelector('.save-bar').style.display = 'none';
    document.getElementById('student-list').innerHTML = `
      <div class="no-class">
        <div class="icon">👑</div>
        담당 셀이 없습니다 (관리자·헬퍼 역할).<br><br>
        <a href="dashboard.html">대시보드로 돌아가기 →</a>
      </div>
    `;
    return;
  }
  loadAttendance();
  CURRENT_WEEK = thisSunday();
  renderWeek();
}

function checkAutoLogin() {
  const pin = localStorage.getItem('access_pin');
  const name = localStorage.getItem('mock_teacher');
  if (pin === PRIVATE_KEY && name) {
    const me = TEACHERS.find(t => t.name === name);
    if (me) { MY = me; showApp(); return; }
  }
  fillSelect();
  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
}

fillSelect();
checkAutoLogin();
</script>
