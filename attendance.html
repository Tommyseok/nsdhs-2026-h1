<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="logo-runner.svg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="내수동 경주자 2026">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Runners 2026 · 출석 입력</title>
<style>
  :root {
    --bg: #0b0f17;
    --card: #1e293b;
    --border: #334155;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --ok: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: none; }
  body {
    margin: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background: linear-gradient(180deg, #0b0f17 0%, #0a0d14 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
    line-height: 1.55;
    font-size: 15px;
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 16px; }

  /* Gate */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #0b0f17 0%, #1e1b3a 100%); }
  .gate-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px 26px; max-width: 380px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
  .gate-card .lock { font-size: 44px; margin-bottom: 14px; }
  .gate-card h1 { margin: 0 0 6px; font-size: 18px; color: #f1f5f9; }
  .gate-card .gate-sub { margin: 0 0 22px; font-size: 13px; color: var(--muted); }
  .gate-card input, .gate-card select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; margin-bottom: 12px; text-align: center; }
  .gate-card button { width: 100%; background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .gate-card .gate-err { color: #fca5a5; font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* Header */
  header {
    background: linear-gradient(135deg, #1e1b3a 0%, #312e81 100%);
    padding: 16px 0;
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    color: #f1f5f9;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  header h1 .my-cell {
    background: rgba(167,139,250,.2);
    color: #c4b5fd;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid rgba(167,139,250,.4);
    font-weight: 700;
  }
  .back-link {
    color: #cbd5e1;
    text-decoration: none;
    background: rgba(255,255,255,.06);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,.12);
  }

  /* Week selector */
  .week-bar {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .week-bar button {
    background: rgba(167,139,250,.15);
    color: #c4b5fd;
    border: 1px solid rgba(167,139,250,.3);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .week-bar button:active { transform: scale(0.95); }
  .week-bar .week-info {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 800;
    color: #f1f5f9;
  }
  .week-bar .week-info .week-sub {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 1px;
  }
  .week-bar .week-info .today-mark {
    color: #6ee7b7;
    font-weight: 700;
    margin-left: 4px;
  }

  /* Summary */
  .summary {
    margin-top: 12px;
    background: rgba(167,139,250,.06);
    border: 1px solid rgba(167,139,250,.2);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 13px;
  }
  .summary .stat { color: #cbd5e1; }
  .summary .stat-num { font-weight: 800; color: #f1f5f9; font-size: 17px; margin-right: 2px; }
  .summary .stat-num.ok { color: #6ee7b7; }
  .summary .stat-num.partial { color: #fcd34d; }
  .summary .stat-num.miss { color: #fca5a5; }
  .summary .stat-num.pending { color: #94a3b8; }

  /* Student list */
  .student-list {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .student {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    transition: border-color 0.15s;
  }
  .student.selected { border-color: var(--accent); }
  .student-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .student-name { font-size: 16px; font-weight: 800; color: #f1f5f9; }
  .student-meta {
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,.04);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .gender-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .gender-pill.male {
    color: #93c5fd;
    background: rgba(96,165,250,.12);
    border: 1px solid rgba(96,165,250,.35);
  }
  .gender-pill.female {
    color: #fbcfe8;
    background: rgba(244,114,182,.12);
    border: 1px solid rgba(244,114,182,.35);
  }
  .cum-rate {
    margin-left: auto;
    font-size: 11.5px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .cum-rate.cum-ok  { background: rgba(16,185,129,.15);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.35); }
  .cum-rate.cum-mid { background: rgba(245,158,11,.15); color: #fcd34d; border: 1px solid rgba(245,158,11,.35); }
  .cum-rate.cum-low { background: rgba(239,68,68,.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,.35); }
  .hist-tag {
    margin-left: auto;
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    background: rgba(148,163,184,.12);
    color: #94a3b8;
    border: 1px solid rgba(148,163,184,.3);
  }
  .hist-tag + .cum-rate { margin-left: 6px; }
  .week-bar.historical {
    background: rgba(148,163,184,.05);
    border-color: rgba(148,163,184,.3);
  }
  .week-bar .term-tag {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(148,163,184,.15);
    color: #94a3b8;
    margin-left: 6px;
    display: inline-block;
  }
  .week-bar .term-tag.h2 {
    background: rgba(167,139,250,.15);
    color: #c4b5fd;
  }

  /* 셀 토글 */
  .cell-tabs {
    margin-top: 16px;
    display: flex; gap: 6px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    padding: 8px; border-radius: 10px;
  }
  .cell-tab {
    flex-shrink: 0;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    color: #cbd5e1;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .cell-tab.my-cell { border-left: 3px solid #fbbf24; }
  .cell-tab.special { background: rgba(251,146,60,.06); color: #fdba74; border-color: rgba(251,146,60,.25); }
  .cell-tab.active {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 3px 8px rgba(124,58,237,.35);
  }
  .cell-tab.special.active {
    background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
    color: #1c1410;
  }

  /* Status buttons */
  .status-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .status-btn {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    color: #94a3b8;
    padding: 10px 8px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .status-btn:active { transform: scale(0.97); }
  .status-btn.active.full {
    background: rgba(16,185,129,.18);
    border-color: #10b981;
    color: #6ee7b7;
  }
  .status-btn.active.partial {
    background: rgba(245,158,11,.18);
    border-color: #f59e0b;
    color: #fcd34d;
  }
  .status-btn.active.absent {
    background: rgba(239,68,68,.18);
    border-color: #ef4444;
    color: #fca5a5;
  }

  /* Note input */
  .note-input {
    display: none;
    margin-top: 10px;
    width: 100%;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 50px;
  }
  .student.show-note .note-input { display: block; }

  /* Save bar */
  .save-bar {
    position: sticky;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    padding: 14px 0;
    margin-top: 20px;
  }
  .save-bar .inner {
    display: flex;
    gap: 8px;
  }
  .save-bar button {
    flex: 1;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .save-bar button.save {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #fff;
    box-shadow: 0 6px 14px rgba(124,58,237,.4);
  }
  .save-bar button.cancel {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: #cbd5e1;
    flex: 0 0 100px;
  }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(16,185,129,.95);
    color: #fff;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .no-class {
    margin-top: 30px;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .no-class .icon { font-size: 40px; margin-bottom: 10px; }
  .no-class a { color: var(--accent); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>

<!-- Gate -->
<div id="gate-root">
  <div class="gate">
    <div class="gate-card">
      <div class="lock"><img src="logo-runner.svg" alt="Runners" style="width:62px;height:62px;border-radius:16px;box-shadow:0 8px 24px rgba(124,58,237,.4)"></div>
      <div style="text-align:center;font-weight:800;letter-spacing:1px;color:#c4b5fd;font-size:13px;margin-bottom:10px">RUNNERS 2026</div>
      <h1>출석 입력</h1>
      <p class="gate-sub">접근 코드 + 본인 이름 선택 후 진입</p>
      <input id="pin-input" type="password" placeholder="🔑 접근 코드" autocomplete="off" style="letter-spacing: 2px;">
      <select id="teacher-select"></select>
      <button onclick="login()">접속</button>
      <div class="gate-err" id="gate-err"></div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app-root" style="display:none">
  <header>
    <div class="container" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <h1>
        <span id="my-name">…</span>
        <span id="my-cell-badge" class="my-cell"></span>
      </h1>
      <a class="back-link" href="dashboard.html">🏠 Home</a>
    </div>
  </header>

  <div class="container">
    <div class="cell-tabs" id="cell-tabs"></div>

    <div class="week-bar">
      <button onclick="prevWeek()">◀</button>
      <div class="week-info">
        <span id="week-label">…</span>
        <span class="week-sub" id="week-sub"></span>
      </div>
      <button onclick="nextWeek()">▶</button>
    </div>

    <div class="summary" id="summary"></div>
    <div class="student-list" id="student-list"></div>

    <div class="save-bar">
      <div class="inner">
        <button class="cancel" onclick="resetAll()">초기화</button>
        <button class="save" onclick="saveAttendance()">💾 저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 * 학생 사진 헬퍼 (Supabase Storage, SDK 없이 REST · 표시 전용)
 *    업로드는 dashboard '내 반' 뷰에서. 여기선 이름 옆 아바타 표시만.
 * ============================================================ */
const Photos = (function () {
  const URL_BASE = 'https://hycwzggbgnimuuhporwf.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5Y3d6Z2diZ25pbXV1aHBvcndmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTQzMTAsImV4cCI6MjA5NDAzMDMxMH0.NeypbxUYf5xoBagDBUPvhit3UOp6k_-_SN32JGgbEJg';
  const BUCKET = 'student-photos';
  const REST = URL_BASE + '/storage/v1';
  const H = { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON };
  let _vers = new Map();
  function slug(name) { const b = new TextEncoder().encode(name); let h = ''; for (let i = 0; i < b.length; i++) h += b[i].toString(16).padStart(2, '0'); return h; }
  function publicUrl(name, ver) { let u = REST + '/object/public/' + BUCKET + '/' + slug(name) + '.jpg'; if (ver) u += '?v=' + encodeURIComponent(ver); return u; }
  function defaultAvatar(gender) {
    const isF = gender === '여'; const bg = isF ? '#3a2435' : '#1e2a44'; const fg = isF ? '#ec8fc0' : '#6ba6e8';
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="' + bg + '"/><circle cx="32" cy="25" r="11" fill="' + fg + '"/><path d="M13 58c0-11 8.5-18 19-18s19 7 19 18z" fill="' + fg + '"/></svg>';
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  }
  function avatarImg(name, gender, size) {
    size = size || 28; const def = defaultAvatar(gender); const ver = _vers.get(slug(name));
    const src = ver ? publicUrl(name, ver) : def; const nm = String(name).replace(/"/g, '&quot;');
    return '<img class="stu-photo" data-name="' + nm + '" data-gender="' + (gender || '') + '" src="' + src + '" data-def="' + def + '" ' +
      'onerror="this.onerror=null;this.src=this.dataset.def;" title="클릭하면 크게 보기" ' +
      'style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:#0f172a;vertical-align:middle;cursor:zoom-in;" alt="">';
  }
  function refresh() {
    document.querySelectorAll('img.stu-photo[data-name]').forEach(img => {
      const ver = _vers.get(slug(img.getAttribute('data-name')));
      if (ver) img.src = publicUrl(img.getAttribute('data-name'), ver);
    });
  }
  async function load() {
    try {
      const res = await fetch(REST + '/object/list/' + BUCKET, { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, H), body: JSON.stringify({ prefix: '', limit: 1000 }) });
      if (res.ok) { const arr = await res.json(); const m = new Map(); (arr || []).forEach(o => { if (o && o.name && /\.jpg$/i.test(o.name)) m.set(o.name.replace(/\.jpg$/i, ''), o.updated_at || o.created_at || ''); }); _vers = m; refresh(); }
    } catch (e) { console.warn('photo load failed', e); }
    return _vers;
  }
  // 클릭 확대 라이트박스
  function openLightbox(src, name) {
    let lb = document.getElementById('photo-lb');
    if (!lb) {
      lb = document.createElement('div'); lb.id = 'photo-lb';
      lb.innerHTML = '<div class="lb-inner"><img id="photo-lb-img" alt=""><div id="photo-lb-cap"></div><div class="lb-hint">아무 곳이나 누르면 닫힘</div></div>';
      lb.addEventListener('click', () => lb.classList.remove('show'));
      document.body.appendChild(lb);
      const st = document.createElement('style');
      st.textContent = '#photo-lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:10000;padding:24px}#photo-lb.show{display:flex}#photo-lb .lb-inner{text-align:center}#photo-lb img{max-width:min(86vw,400px);max-height:74vh;border-radius:18px;border:3px solid #a78bfa;background:#0f172a;box-shadow:0 20px 60px rgba(0,0,0,.6);object-fit:contain}#photo-lb #photo-lb-cap{margin-top:14px;color:#fff;font-size:19px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.6)}#photo-lb .lb-hint{margin-top:6px;color:#cbd5e1;font-size:12px}';
      document.head.appendChild(st);
    }
    document.getElementById('photo-lb-img').src = src;
    document.getElementById('photo-lb-cap').textContent = name || '';
    lb.classList.add('show');
  }
  function enableLightbox() {
    if (window.__photoLbOn) return; window.__photoLbOn = true;
    document.addEventListener('click', e => {
      const img = e.target.closest && e.target.closest('img.stu-photo');
      if (!img || img.closest('.photo-edit')) return;
      openLightbox(img.src, img.getAttribute('data-name'));
    });
  }
  return { slug, publicUrl, defaultAvatar, avatarImg, load, refresh, openLightbox, enableLightbox };
})();
Photos.load();
Photos.enableLightbox();

/* ============================================================
 * Hub — Supabase 공유 데이터 (접속 로그 + 출석 중앙 저장, REST)
 * ============================================================ */
const Hub = (function () {
  const URL_BASE = 'https://hycwzggbgnimuuhporwf.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5Y3d6Z2diZ25pbXV1aHBvcndmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTQzMTAsImV4cCI6MjA5NDAzMDMxMH0.NeypbxUYf5xoBagDBUPvhit3UOp6k_-_SN32JGgbEJg';
  const REST = URL_BASE + '/rest/v1';
  const H = { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON, 'Content-Type': 'application/json' };
  // 접속 기록 (브라우저별 30분 쓰로틀)
  function logAccess(teacher, page) {
    if (!teacher) return;
    try {
      const k = 'lastlog_' + page, now = Date.now();
      if (now - (+(localStorage.getItem(k) || 0)) < 30 * 60 * 1000) return;
      localStorage.setItem(k, String(now));
    } catch (e) {}
    fetch(REST + '/access_log', { method: 'POST', headers: Object.assign({ 'Prefer': 'return=minimal' }, H), body: JSON.stringify({ teacher: teacher, page: page || '' }) }).catch(function () {});
  }
  // 출석 전체 로드 → {week: {student: {status, note, cell, teacher}}}
  async function loadAttendance() {
    const map = {};
    try {
      const res = await fetch(REST + '/attendance?select=cell,week,student,status,note,teacher', { headers: H });
      if (res.ok) (await res.json()).forEach(function (r) {
        if (!map[r.week]) map[r.week] = {};
        map[r.week][r.student] = { status: r.status || '', note: r.note || '', cell: r.cell, teacher: r.teacher };
      });
    } catch (e) { console.warn('attendance load failed', e); }
    return map;
  }
  // 출석 bulk upsert (records: [{cell, week, student, status, note, teacher}])
  async function saveAttendance(records) {
    if (!records || !records.length) return true;
    const res = await fetch(REST + '/attendance', {
      method: 'POST', headers: Object.assign({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }, H),
      body: JSON.stringify(records)
    });
    if (!res.ok) { let t = ''; try { t = await res.text(); } catch (e) {} throw new Error('출석 저장 실패 (' + res.status + ') ' + t); }
    return true;
  }
  async function select(path) { try { const r = await fetch(REST + '/' + path, { headers: H }); return r.ok ? await r.json() : []; } catch (e) { return []; } }
  return { logAccess, loadAttendance, saveAttendance, select, REST, H };
})();

/* =========================================================

 * ========================================================= */
function getSundayOf(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function ymd(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtKor(d) {
  return `${d.getMonth()+1}/${d.getDate()} (${'일월화수목금토'[d.getDay()]})`;
}
function thisSunday() { return ymd(getSundayOf(new Date())); }

function prevWeek() {
  const d = new Date(CURRENT_WEEK + 'T00:00:00');
  d.setDate(d.getDate() - 7);
  CURRENT_WEEK = ymd(d);
  renderWeek();
}
function nextWeek() {
  const today = new Date();
  const next = new Date(CURRENT_WEEK + 'T00:00:00');
  next.setDate(next.getDate() + 7);
  if (next > today) return; // 미래 주차 안 보여줌
  CURRENT_WEEK = ymd(next);
  renderWeek();
}

function renderWeek() {
  const d = new Date(CURRENT_WEEK + 'T00:00:00');
  const label = document.getElementById('week-label');
  const sub = document.getElementById('week-sub');
  const isHistorical = HISTORICAL_WEEKS.includes(CURRENT_WEEK);
  const termTag = isHistorical
    ? '<span class="term-tag">🗓️ 1학기</span>'
    : '<span class="term-tag h2">2학기</span>';
  label.innerHTML = fmtKor(d) + ' ' + termTag;
  if (ymd(d) === thisSunday()) {
    label.innerHTML = fmtKor(d) + ' <span class="today-mark">· 이번 주</span> ' + termTag;
  }
  const diff = Math.round((d - getSundayOf(new Date())) / 86400000 / 7);
  if (diff === 0) sub.textContent = '오늘 주차';
  else if (diff < 0) sub.textContent = `${-diff}주 전`;
  else sub.textContent = `${diff}주 후`;
  // 주차 박스 색상
  document.querySelector('.week-bar').classList.toggle('historical', isHistorical);
  renderStudents();
}

// 학생 누적 출석률 (1학기 historical + 2학기 사용자 입력)
// 모든 학생이 동일한 분모 (17주) 로 비교되도록 빈 칸도 결석으로 처리
function cumulativeRate(name) {
  let total = 0, sum = 0;
  // 1학기 historical — 17주 전체 카운트 (빈 칸 = 결석)
  const hStr = HISTORICAL_ATTENDANCE[name];
  if (hStr) {
    total += HISTORICAL_WEEKS.length;
    [...hStr].forEach(c => {
      if (c === 'O') sum++;
    });
  }
  // 사용자 입력 (2학기)
  Object.keys(ATTENDANCE).forEach(w => {
    if (HISTORICAL_WEEKS.includes(w)) return;
    const rec = ATTENDANCE[w][name];
    if (!rec || !rec.status) return;
    total++;
    if (rec.status === 'full') sum++;
    else if (rec.status === 'partial') sum += 0.5;
  });
  if (total === 0) return null;
  return { rate: Math.round(sum / total * 100), total };
}

  if (!MY || !MY.cell) return;
  if (!SELECTED_CELL) SELECTED_CELL = MY.cell;
  const students = CELL_STUDENTS[SELECTED_CELL] || [];
  const sorted = students.slice().sort((a, b) => {
    const ga = (STUDENT_INFO[a]||{}).g||9, gb = (STUDENT_INFO[b]||{}).g||9;
    if (ga !== gb) return gb - ga;
    return a.localeCompare(b, 'ko');
  });
  const week = ATTENDANCE[CURRENT_WEEK] || {};
  const isHistorical = HISTORICAL_WEEKS.includes(CURRENT_WEEK);
  const list = document.getElementById('student-list');
  list.innerHTML = sorted.map(name => {
    const info = STUDENT_INFO[name] || {g:'?', s:'?'};
    // 사용자 입력 우선, 없으면 historical
    let rec = week[name];
    let fromHistorical = false;
    if (!rec || !rec.status) {
      const h = historicalRec(name, CURRENT_WEEK);
      if (h) { rec = h; fromHistorical = true; }
    }
    rec = rec || {status:'', note:''};
    const gCls = info.s === '남' ? 'male' : 'female';
    const cum = cumulativeRate(name);
    let cumBadge = '';
    if (cum) {
      const cls = cum.rate >= 85 ? 'cum-ok' : cum.rate >= 50 ? 'cum-mid' : 'cum-low';
      cumBadge = `<span class="cum-rate ${cls}" title="누적 출석률 (전체 ${cum.total}주)">📊 ${cum.rate}%</span>`;
    }
    const histTag = fromHistorical ? '<span class="hist-tag" title="1학기 기록">🗓️ 1학기</span>' : '';
    return `
      <div class="student ${rec.status ? 'selected' : ''} ${rec.note ? 'show-note' : ''}" data-name="${name}">
        <div class="student-head">
          <span style="display:inline-flex;align-items:center;gap:8px;vertical-align:middle">${Photos.avatarImg(name, info.s, 34)}<span class="student-name">${escapeHtml(name)}</span></span>
          <span class="gender-pill ${gCls}">${info.s}</span>
          <span class="student-meta">${info.g}학년</span>
          ${histTag}
          ${cumBadge}
        </div>
        <div class="status-row">
          <button class="status-btn full ${rec.status==='full'?'active':''}" onclick="setStatus('${name}','full')">● 전참</button>
          <button class="status-btn partial ${rec.status==='partial'?'active':''}" onclick="setStatus('${name}','partial')">◐ 부분</button>
          <button class="status-btn absent ${rec.status==='absent'?'active':''}" onclick="setStatus('${name}','absent')">○ 불참</button>
        </div>
        <textarea class="note-input" placeholder="결석 사유·메모 (선택)" oninput="setNote('${name}', this.value)">${escapeHtml(rec.note||'')}</textarea>
        ${rec.status==='absent' || rec.status==='partial' ? '' : ''}
      </div>
    `;
  }).join('');
  // absent/partial 일 때 자동으로 메모 입력 노출
  document.querySelectorAll('.student').forEach(el => {
    const name = el.getAttribute('data-name');
    const rec = week[name];
    if (rec && (rec.status === 'absent' || rec.status === 'partial')) {
      el.classList.add('show-note');
    }
  });
  renderSummary();
}

function renderCellTabs() {
  const tabs = document.getElementById('cell-tabs');
  if (!MY || !MY.cell) { tabs.style.display = 'none'; return; }
  const myFamN = CELL_FAMILY_MAP[MY.cell];
  const famCells = Object.keys(CELL_FAMILY_MAP).filter(c => CELL_FAMILY_MAP[c] === myFamN);
  // 내 셀이 먼저, 그 다음 같은 대가족 다른 셀들
  const sortedCells = [MY.cell, ...famCells.filter(c => c !== MY.cell)];
  tabs.innerHTML = sortedCells.map(c => {
    const isActive = c === SELECTED_CELL;
    const isMy = c === MY.cell;
    const isSp = c.startsWith('Sp');
    const label = isSp
      ? `💛 보고 싶은 친구들`
      : `소그룹반 ${c.slice(1)}${isMy ? ' (내반)' : ''}`;
    const cls = ['cell-tab'];
    if (isActive) cls.push('active');
    if (isMy) cls.push('my-cell');
    if (isSp) cls.push('special');
    return `<button class="${cls.join(' ')}" onclick="SELECTED_CELL='${c}';renderCellTabs();renderStudents();">${label}</button>`;
  }).join('');
}

function renderSummary() {
  const students = CELL_STUDENTS[SELECTED_CELL] || [];
  const week = ATTENDANCE[CURRENT_WEEK] || {};
  let full=0, partial=0, absent=0, pending=0;
  students.forEach(s => {
    const st = (week[s]||{}).status;
    if (st === 'full') full++;
    else if (st === 'partial') partial++;
    else if (st === 'absent') absent++;
    else pending++;
  });
  document.getElementById('summary').innerHTML = `
    <span class="stat"><span class="stat-num">${students.length}</span>명</span>
    <span class="stat"><span class="stat-num ok">${full}</span>전참</span>
    <span class="stat"><span class="stat-num partial">${partial}</span>부분</span>
    <span class="stat"><span class="stat-num miss">${absent}</span>불참</span>
    ${pending > 0 ? `<span class="stat"><span class="stat-num pending">${pending}</span>미입력</span>` : ''}
  `;
}

async function saveAttendance() {
  persistAttendance();
  // 내가 이번 세션에서 수정한 기록만 Supabase 중앙 저장 (전 선생님 공유)
  const records = [];
  DIRTY.forEach(key => {
    const i = key.indexOf('|'); const week = key.slice(0, i); const student = key.slice(i + 1);
    const rec = (ATTENDANCE[week] || {})[student]; if (!rec) return;
    records.push({ cell: STUDENT_TO_CELL[student] || (MY && MY.cell) || '', week: week, student: student, status: rec.status || '', note: rec.note || '', teacher: MY ? MY.name : '' });
  });
  if (!records.length) { showToast('💾 저장됨'); return; }
  showToast('💾 저장 중…');
  try {
    await Hub.saveAttendance(records);
    DIRTY.clear();
    showToast('✅ 저장 완료 — 전체 공유됨');
  } catch (e) {
    console.error(e);
    showToast('⚠️ 브라우저에는 저장됨 / 공유 실패 — 인터넷 확인 후 다시 저장');
  }
}

function resetAll() {
  if (!confirm('이번 주차 입력을 모두 지우시겠습니까?')) return;
  delete ATTENDANCE[CURRENT_WEEK];
  persistAttendance();
  renderStudents();
  showToast('이번 주차 입력 삭제');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
 * 진입
 * ========================================================= */
async function showApp() {
  document.getElementById('gate-root').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  document.getElementById('my-name').textContent = MY.name + ' 선생님';
  Hub.logAccess(MY.name, 'attendance');
  if (MY.cell) {
    document.getElementById('my-cell-badge').textContent = MY.cell + ' · ' + MY.role;
  }
  if (!MY.cell || !CELL_STUDENTS[MY.cell]) {
    document.querySelector('.container .week-bar').style.display = 'none';
    document.getElementById('summary').style.display = 'none';
    document.querySelector('.save-bar').style.display = 'none';
    document.getElementById('student-list').innerHTML = `
      <div class="no-class">
        <div class="icon">👑</div>
        담당 셀이 없습니다 (관리자·헬퍼 역할).<br><br>
        <a href="dashboard.html">🏠 Home으로 →</a>
      </div>
    `;
    return;
  }
  loadAttendance();
  SELECTED_CELL = MY.cell;
  CURRENT_WEEK = thisSunday();
  renderCellTabs();
  renderWeek();
  // Supabase 공유 출석 병합 (다른 선생님이 입력한 것도 반영) 후 재렌더
  try {
    const remote = await Hub.loadAttendance();
    Object.keys(remote).forEach(w => { ATTENDANCE[w] = Object.assign(ATTENDANCE[w] || {}, remote[w]); });
    renderWeek();
  } catch (e) { console.warn(e); }
}

function checkAutoLogin() {
  const pin = localStorage.getItem('access_pin');
  const name = localStorage.getItem('mock_teacher');
  if (pin === PRIVATE_KEY && name) {
    const me = TEACHERS.find(t => t.name === name);
    if (me) { MY = me; showApp(); return; }
  }
  fillSelect();
  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
}

fillSelect();
checkAutoLogin();
</script>
