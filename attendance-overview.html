<style>

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {

  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

  .gate-card h1 { margin: 0 0 6px; font-size: 18px; color: #f1f5f9; }
  .gate-card .gate-sub { margin: 0 0 22px; font-size: 13px; color: var(--muted); }
  .gate-card input { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; margin-bottom: 12px; text-align: center; }
  .gate-card button { width: 100%; background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .gate-card .gate-err { color: #fca5a5; font-size: 12px; margin-top: 10px; min-height: 16px; }

  .filter-bar {
    margin-top: 16px;
    display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    padding: 10px 12px; border-radius: 10px;
    align-items: center;
  }
  .filter-bar input[type=search] {
    flex: 1;
    min-width: 180px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-family: inherit;
  }
  .filter-bar select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .filter-bar .filter-label {
    font-size: 11.5px; color: var(--muted); font-weight: 700;
  }

  /* Family blocks */
  .family-section {
    margin-top: 16px;
    border: 2px solid #6d28d9;
    border-radius: 14px;
    padding: 14px;
    background: linear-gradient(180deg, rgba(91,33,182,.12) 0%, rgba(76,29,149,.06) 100%);
  }
  .family-header {
    padding: 8px 12px;
    background: #2e1065;
    border-radius: 8px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;

  .family-name { font-size: 15px; font-weight: 800; color: #f1f5f9; }
  .family-meta { font-size: 11px; color: var(--muted); margin-left: auto; }

  .cell-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }
  .cell-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .cell-head {
    display: flex; align-items: center; gap: 6px;
    padding-bottom: 8px; margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-wrap: wrap;
  }
  .cell-name { font-size: 14px; font-weight: 800; color: #f1f5f9; }
  .cell-teachers { font-size: 11px; color: var(--muted); }
  .cell-rate {
    margin-left: auto;
    font-size: 12px; font-weight: 800;
    padding: 2px 8px; border-radius: 999px;
  }
  .cell-rate.ok   { background: rgba(16,185,129,.15);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.35); }
  .cell-rate.mid  { background: rgba(245,158,11,.15); color: #fcd34d; border: 1px solid rgba(245,158,11,.35); }
  .cell-rate.low  { background: rgba(239,68,68,.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,.35); }

  .student-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px dotted rgba(255,255,255,.05);
  }
  .student-row:last-child { border-bottom: none; }
  .student-row .sname {
    font-weight: 700; color: #f1f5f9;

  .gender-pill {
    font-size: 9.5px; font-weight: 700;
    padding: 1px 5px; border-radius: 3px;
  }
  .gender-pill.male  { color: #93c5fd; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.3); }

  .grade-meta { font-size: 10px; color: var(--muted); margin-left: 2px; }
  .att-dots {
    font-family: monospace; font-size: 14px;
    letter-spacing: 0.5px; color: #6ee7b7;
  }
  .att-dots .miss { color: #fca5a5; }
  .att-dots .partial { color: #fcd34d; }
  .att-dots .empty { color: var(--muted); opacity: 0.4; }
  .cum-rate {
    font-size: 11px; font-weight: 800;
    padding: 2px 7px; border-radius: 4px;
    min-width: 50px; text-align: center;

  .cum-rate.ok   { background: rgba(16,185,129,.15);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.35); }
  .cum-rate.mid  { background: rgba(245,158,11,.15); color: #fcd34d; border: 1px solid rgba(245,158,11,.35); }

  /* Top stats */
  .top-stats {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    text-align: center;
  }
  .stat-card .stat-num {
    font-size: 24px; font-weight: 800;

  .stat-card .stat-label {
    font-size: 11px; color: var(--muted); font-weight: 600;

  /* Legend */
  .legend {
    margin-top: 14px;
    background: rgba(0,0,0,.2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;

  }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--muted); }

</head>

  const H = { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON };
  let _vers = new Map();
  function slug(name) { const b = new TextEncoder().encode(name); let h = ''; for (let i = 0; i < b.length; i++) h += b[i].toString(16).padStart(2, '0'); return h; }
  function publicUrl(name, ver) { let u = REST + '/object/public/' + BUCKET + '/' + slug(name) + '.jpg'; if (ver) u += '?v=' + encodeURIComponent(ver); return u; }
  function defaultAvatar(gender) {
    const isF = gender === '여'; const bg = isF ? '#3a2435' : '#1e2a44'; const fg = isF ? '#ec8fc0' : '#6ba6e8';
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="' + bg + '"/><circle cx="32" cy="25" r="11" fill="' + fg + '"/><path d="M13 58c0-11 8.5-18 19-18s19 7 19 18z" fill="' + fg + '"/></svg>';
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  }
  function avatarImg(name, gender, size) {
    size = size || 28; const def = defaultAvatar(gender); const ver = _vers.get(slug(name));
    const src = ver ? publicUrl(name, ver) : def; const nm = String(name).replace(/"/g, '&quot;');
    return '<img class="stu-photo" data-name="' + nm + '" data-gender="' + (gender || '') + '" src="' + src + '" data-def="' + def + '" ' +

      'style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:#0f172a;vertical-align:middle;cursor:zoom-in;" alt="">';
  }
  function refresh() {
    document.querySelectorAll('img.stu-photo[data-name]').forEach(img => {
      const ver = _vers.get(slug(img.getAttribute('data-name')));
      if (ver) img.src = publicUrl(img.getAttribute('data-name'), ver);
    });
  }
  async function load() {
    try {
      const res = await fetch(REST + '/object/list/' + BUCKET, { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, H), body: JSON.stringify({ prefix: '', limit: 1000 }) });
      if (res.ok) { const arr = await res.json(); const m = new Map(); (arr || []).forEach(o => { if (o && o.name && /\.jpg$/i.test(o.name)) m.set(o.name.replace(/\.jpg$/i, ''), o.updated_at || o.created_at || ''); }); _vers = m; refresh(); }
    } catch (e) { console.warn('photo load failed', e); }
    return _vers;
  }
  function openLightbox(src, name) {
    let lb = document.getElementById('photo-lb');
    if (!lb) {
      lb = document.createElement('div'); lb.id = 'photo-lb';
      lb.innerHTML = '<div class="lb-inner"><img id="photo-lb-img" alt=""><div id="photo-lb-cap"></div><div class="lb-hint">아무 곳이나 누르면 닫힘</div></div>';

      document.head.appendChild(st);
    }
    document.getElementById('photo-lb-img').src = src;
    document.getElementById('photo-lb-cap').textContent = name || '';
    lb.classList.add('show');
  }
  function enableLightbox() {
    if (window.__photoLbOn) return; window.__photoLbOn = true;
    document.addEventListener('click', e => {
      const img = e.target.closest && e.target.closest('img.stu-photo');
      if (!img || img.closest('.photo-edit')) return;
      openLightbox(img.src, img.getAttribute('data-name'));
    });
  }
  return { slug, publicUrl, defaultAvatar, avatarImg, load, refresh, openLightbox, enableLightbox };
})();

  function logAccess(teacher, page) {
    if (!teacher) return;
    try {
      const k = 'lastlog_' + page, now = Date.now();
      if (now - (+(localStorage.getItem(k) || 0)) < 30 * 60 * 1000) return;
      localStorage.setItem(k, String(now));
    } catch (e) {}
    fetch(REST + '/access_log', { method: 'POST', headers: Object.assign({ 'Prefer': 'return=minimal' }, H), body: JSON.stringify({ teacher: teacher, page: page || '' }) }).catch(function () {});
  }
  async function loadAttendance() {
    const map = {};
    try {
      const res = await fetch(REST + '/attendance?select=cell,week,student,status,note,teacher', { headers: H });
      if (res.ok) (await res.json()).forEach(function (r) {
        if (!map[r.week]) map[r.week] = {};
        map[r.week][r.student] = { status: r.status || '', note: r.note || '', cell: r.cell, teacher: r.teacher };
      });
    } catch (e) { console.warn('attendance load failed', e); }
    return map;
  }
  async function saveAttendance(records) {
    if (!records || !records.length) return true;
    const res = await fetch(REST + '/attendance', { method: 'POST', headers: Object.assign({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }, H), body: JSON.stringify(records) });
    if (!res.ok) { let t = ''; try { t = await res.text(); } catch (e) {} throw new Error('출석 저장 실패 (' + res.status + ') ' + t); }
    return true;
  }
  async function select(path) { try { const r = await fetch(REST + '/' + path, { headers: H }); return r.ok ? await r.json() : []; } catch (e) { return []; } }
  return { logAccess, loadAttendance, saveAttendance, select, REST, H };

function login() {

  if (pin !== PRIVATE_KEY) { document.getElementById('gate-err').textContent = '❌ 접근 코드 불일치'; return; }

  showApp();

/* ===== 출석 데이터 헬퍼 (localStorage + Supabase 공유 병합) ===== */
function userAtt() {
  let local = {};
  try { local = JSON.parse(localStorage.getItem('attendance_data') || '{}'); } catch (e) {}
  const merged = {};
  [local, REMOTE_ATT].forEach(src => {
    Object.keys(src || {}).forEach(w => { merged[w] = Object.assign(merged[w] || {}, src[w]); });
  });
  return merged;
}

function recentWeeks(n) {
  const today = new Date(); today.setHours(0,0,0,0);
  const sunday = new Date(today); sunday.setDate(today.getDate() - today.getDay());
  const weeks = [];
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(sunday); d.setDate(sunday.getDate() - i*7);
    weeks.push(d.toISOString().substring(0,10));
  }
  return weeks;
}

function cumulativeRate(name, isNew) {
  if (isNew) return null; // 신규 학생은 데이터 없음
  let total = 0, sum = 0;
  const hStr = HISTORICAL_ATTENDANCE[name];
  if (hStr) {
    total += HISTORICAL_WEEKS.length;
    [...hStr].forEach(c => { if (c === 'O') sum++; });
  }
  const data = userAtt();
  Object.keys(data).forEach(w => {
    if (HISTORICAL_WEEKS.includes(w)) return;
    const rec = data[w][name];
    if (!rec || !rec.status) return;
    total++;
    if (rec.status === 'full') sum++;
    else if (rec.status === 'partial') sum += 0.5;
  });
  if (total === 0) return null;
  return Math.round(sum / total * 100);
}

function recent4String(name) {
  const data = userAtt();
  return recentWeeks(4).map(w => {
    const rec = (data[w] || {})[name];
    if (rec && rec.status) {
      if (rec.status === 'full') return '●';
      if (rec.status === 'partial') return '◐';
      if (rec.status === 'absent') return '○';
    }
    const idx = HISTORICAL_WEEKS.indexOf(w);
    if (idx >= 0) {
      const c = (HISTORICAL_ATTENDANCE[name] || '')[idx];
      if (c === 'O') return '●';
      if (c === 'X') return '○';
    }
    return '·';
  }).join('');
}

function recent4Rate(name) {
  const s = recent4String(name);
  let total = 0, sum = 0;
  [...s].forEach(c => {
    if (c === '·') return;
    total++;
    if (c === '●') sum++;
    else if (c === '◐') sum += 0.5;
  });
  if (total === 0) return null;
  return Math.round(sum / total * 100);
}

/* ===== 렌더링 ===== */
function rateCls(rate) {
  if (rate === null) return 'none';
  if (rate >= 85) return 'ok';
  if (rate >= 50) return 'mid';
  return 'low';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderAll() {
  const search = (document.getElementById('search').value || '').trim();
  const sort = document.getElementById('sort').value;
  const filter = document.getElementById('filterRate').value;

  // 모든 학생 + 셀 정보 + 출석률
  const allStudents = [];
  Object.entries(CELL_STUDENTS).forEach(([cell, students]) => {
    students.forEach(st => {
      const cum = cumulativeRate(st.name, st.isNew);
      const r4 = recent4Rate(st.name);
      allStudents.push({...st, cell, cum, r4, fam: CELL_FAMILY[cell]});
    });
  });

  // 검색 + 필터
  let filtered = allStudents.slice();
  if (search) filtered = filtered.filter(s => s.name.includes(search));
  if (filter === 'low') filtered = filtered.filter(s => s.cum !== null && s.cum < 50);
  else if (filter === 'absent4') filtered = filtered.filter(s => {
    const r = recent4String(s.name);
    return r === '○○○○';
  });
  else if (filter === 'newOnly') filtered = filtered.filter(s => s.isNew);

  // 통계
  const totalN = allStudents.length;
  const matchN = filtered.length;
  const ok85 = allStudents.filter(s => s.cum !== null && s.cum >= 85).length;
  const low50 = allStudents.filter(s => s.cum !== null && s.cum < 50).length;
  const absent4 = allStudents.filter(s => recent4String(s.name) === '○○○○').length;
  document.getElementById('top-stats').innerHTML = `
    <div class="stat-card"><span class="stat-num">${totalN}</span><span class="stat-label">총 학생 수</span></div>
    <div class="stat-card"><span class="stat-num" style="color:#6ee7b7">${ok85}</span><span class="stat-label">85%+ 안정 출석</span></div>
    <div class="stat-card"><span class="stat-num" style="color:#fca5a5">${low50}</span><span class="stat-label">50% 미만</span></div>
    <div class="stat-card"><span class="stat-num" style="color:#f97316">${absent4}</span><span class="stat-label">최근 4주 연속 결석</span></div>
  `;

  // 정렬 후 렌더
  const content = document.getElementById('content');
  if (sort === 'cell') {
    // 대가족 → 셀별 그룹
    const families = {};
    Object.keys(CELL_FAMILY).forEach(c => {
      const fam = CELL_FAMILY[c];
      if (!families[fam]) families[fam] = {};
      families[fam][c] = [];
    });
    filtered.forEach(s => {
      if (families[s.fam] && families[s.fam][s.cell]) families[s.fam][s.cell].push(s);
    });
    let html = '';
    for (let famN = 1; famN <= 6; famN++) {
      const fam = families[famN];
      if (!fam) continue;
      const totalStudents = Object.values(fam).flat();
      if (totalStudents.length === 0) continue;
      const famRate = totalStudents.filter(s => s.cum !== null).reduce((sum, s) => sum + s.cum, 0)
                    / Math.max(1, totalStudents.filter(s => s.cum !== null).length);
      html += `<section class="family-section">
        <div class="family-header">
          <span class="family-name">👨‍👩‍👧‍👦 대가족 ${famN}</span>
          <span class="family-meta">${totalStudents.length}명 · 평균 ${Math.round(famRate)}%</span>
        </div>
        <div class="cell-grid">`;
      Object.keys(fam).forEach(cellName => {
        const sts = fam[cellName];
        if (sts.length === 0) return;
        const isSp = cellName.startsWith('Sp');
        const t = CELL_TEACHERS[cellName];
        const tHtml = isSp ? '<span class="cell-teachers">목회자·특별케어</span>'
                          : `<span class="cell-teachers">담임 ${t?.h||''}${t?.s ? ' · 부담임 ' + t.s : ''}</span>`;
        const cellAvg = sts.filter(s => s.cum !== null).reduce((sum, s) => sum + s.cum, 0)
                      / Math.max(1, sts.filter(s => s.cum !== null).length);
        const cellRateCls = rateCls(cellAvg);
        html += `<div class="cell-card">
          <div class="cell-head">
            <span class="cell-name">${escapeHtml(cellName.startsWith('Sp') ? 'Special '+cellName.slice(2) : '소그룹반 '+cellName.slice(1))}</span>
            ${tHtml}
            <span class="cell-rate ${cellRateCls}">${Math.round(cellAvg)}%</span>
          </div>`;
        // 학생 정렬: 학년 내림차순 → 이름
        sts.sort((a,b) => a.g !== b.g ? b.g - a.g : a.name.localeCompare(b.name,'ko'));
        sts.forEach(s => {
          const r4 = recent4String(s.name);
          const r4Html = [...r4].map(c => {
            if (c === '○') return '<span class="miss">○</span>';
            if (c === '◐') return '<span class="partial">◐</span>';
            if (c === '●') return '●';
            return '<span class="empty">·</span>';
          }).join('');
          const cumCls = rateCls(s.cum);
          const cumText = s.cum === null ? '—' : s.cum + '%';
          html += `<div class="student-row">
            <span class="sname">
              ${Photos.avatarImg(s.name, s.s, 28)} ${escapeHtml(s.name)}
              <span class="gender-pill ${s.s === '남' ? 'male' : 'female'}">${s.s}</span>
              <span class="grade-meta">${s.g}학</span>
            </span>
            <span class="att-dots">${r4Html}</span>
            <span class="cum-rate ${cumCls}">${cumText}</span>
          </div>`;
        });
        html += '</div>';
      });
      html += '</div></section>';
    }
    content.innerHTML = html || '<div class="empty" style="text-align:center;padding:40px;color:#94a3b8">검색 결과 없음</div>';
  } else {
    // flat 리스트 정렬
    if (sort === 'cumAsc') filtered.sort((a,b) => (a.cum ?? 999) - (b.cum ?? 999));
    else if (sort === 'cumDesc') filtered.sort((a,b) => (b.cum ?? -1) - (a.cum ?? -1));
    else if (sort === 'recentAsc') filtered.sort((a,b) => (a.r4 ?? 999) - (b.r4 ?? 999));
    let html = `<section class="family-section" style="border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.05)">
      <div class="family-header" style="background:rgba(124,58,237,.25)">
        <span class="family-name">📋 ${matchN}명 ${filter !== 'all' ? '(필터 적용)' : ''}</span>
      </div>`;
    filtered.forEach(s => {
      const r4 = recent4String(s.name);
      const r4Html = [...r4].map(c => {
        if (c === '○') return '<span class="miss">○</span>';
        if (c === '◐') return '<span class="partial">◐</span>';
        if (c === '●') return '●';
        return '<span class="empty">·</span>';
      }).join('');
      const cumCls = rateCls(s.cum);
      const cumText = s.cum === null ? '—' : s.cum + '%';
      html += `<div class="student-row" style="padding:8px 12px;background:rgba(255,255,255,.02);border-radius:6px;margin-bottom:4px;border-bottom:none">
        <span class="sname">
          ${Photos.avatarImg(s.name, s.s, 28)} ${escapeHtml(s.name)}
          <span class="gender-pill ${s.s === '남' ? 'male' : 'female'}">${s.s}</span>
          <span class="grade-meta">${s.g}학 · ${escapeHtml(s.cell)}</span>
        </span>
        <span class="att-dots">${r4Html}</span>
        <span class="cum-rate ${cumCls}">${cumText}</span>
      </div>`;
    });
    html += '</section>';
    content.innerHTML = html;
  }
}

async function showApp() {
  document.getElementById('gate-root').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  document.getElementById('search').addEventListener('input', renderAll);
  Hub.logAccess(localStorage.getItem('mock_teacher'), 'overview');
  renderAll();
  // Supabase 공유 출석 로드 후 재렌더 (전 선생님 입력 반영)
  try { REMOTE_ATT = await Hub.loadAttendance(); renderAll(); } catch (e) { console.warn(e); }
}

function checkAutoLogin() {
  if (localStorage.getItem('access_pin') === PRIVATE_KEY) showApp();
  else {
    document.getElementById('pin-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  }
}
