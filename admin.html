    const map = {};
    try {
      const res = await fetch(REST + '/attendance?select=cell,week,student,status,note,teacher', { headers: H });
      if (res.ok) (await res.json()).forEach(function (r) { if (!map[r.week]) map[r.week] = {}; map[r.week][r.student] = { status: r.status || '', note: r.note || '', cell: r.cell, teacher: r.teacher }; });
    } catch (e) { console.warn(e); }
    return map;
  }
  async function select(path) { try { const r = await fetch(REST + '/' + path, { headers: H }); return r.ok ? await r.json() : []; } catch (e) { return []; } }
  return { logAccess, loadAttendance, select };
})();

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sundayOf(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtWk(w){ const d=new Date(w+'T00:00:00'); return (d.getMonth()+1)+'/'+d.getDate(); }
function recentSundays(n){ const out=[]; let s=sundayOf(new Date()); for(let i=0;i<n;i++){ out.push(ymd(s)); s=new Date(s); s.setDate(s.getDate()-7);} return out; }
function relTime(iso){ if(!iso) return '—'; const t=new Date(iso).getTime(); const m=Math.floor((Date.now()-t)/60000);
  if(m<1)return '방금'; if(m<60)return m+'분 전'; const h=Math.floor(m/60); if(h<24)return h+'시간 전'; const dd=Math.floor(h/24); if(dd<7)return dd+'일 전'; return new Date(iso).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}); }

  const other=document.createElement('optgroup'); other.label='그 외 (관리자 아님)';
  TEACHERS.filter(t=>!t.admin).forEach(t=>{ const o=document.createElement('option'); o.value=t.name; o.textContent=t.name; other.appendChild(o); });
  sel.appendChild(other);
  const saved=localStorage.getItem('mock_teacher'); if(saved) sel.value=saved;
}
function adminLogin(){
  const pin=(document.getElementById('pin-input').value||'').trim();
  const name=document.getElementById('teacher-select').value;
  const err=document.getElementById('gate-err');
  if(pin!==PRIVATE_KEY){ err.textContent='❌ 접근 코드가 일치하지 않습니다'; return; }
  const me=TEACHERS.find(t=>t.name===name);
  if(!me){ err.textContent='❌ 본인 이름을 선택해 주세요'; return; }
  if(!me.admin){ err.textContent='⛔ 관리자 전용 페이지입니다. (국장단·목사·총무만 접근)'; return; }
  err.textContent='';
  localStorage.setItem('mock_teacher', name);
  localStorage.setItem('access_pin', pin);
  MY=me; enterApp();
}
function logout(){ localStorage.removeItem('mock_teacher'); document.getElementById('app-root').style.display='none'; document.getElementById('gate-root').style.display=''; }
function enterApp(){
  document.getElementById('gate-root').style.display='none';
  document.getElementById('app-root').style.display='';
  document.getElementById('admin-name').textContent=MY.name;
  Hub.logAccess(MY.name, 'admin');
  renderAll();
}

/* ============ 렌더 ============ */
let SEL_WEEK = ymd(sundayOf(new Date()));
async function renderAll(){
  const body=document.getElementById('admin-body');
  body.innerHTML='<div class="card"><span class="spin"></span><span class="loading">현황을 불러오는 중…</span></div>';
  const [logs, att, photoSet, prayers, notices] = await Promise.all([
    Hub.select('access_log?select=teacher,page,at&order=at.desc&limit=3000'),
    Hub.loadAttendance(),
    Photos.load(),
    fetch('data/prayers.json?cb='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('data/notices.json?cb='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  ]);
  body.innerHTML =
    sectionAccess(logs) +
    sectionAttendance(att) +
    sectionPhotos(photoSet) +
    sectionPrayerNotice(prayers, notices);
  // 출석 주차 선택 이벤트
  const wk=document.getElementById('wk-sel');
  if(wk) wk.addEventListener('change', e=>{ SEL_WEEK=e.target.value; document.getElementById('att-body').innerHTML=attTable(window.__ATT||{}); });
}

/* 1) 접속 현황 */
function sectionAccess(logs){
  const by={};
  logs.forEach(l=>{ if(!by[l.teacher]) by[l.teacher]={last:l.at,count:0}; by[l.teacher].count++; if(l.at>by[l.teacher].last) by[l.teacher].last=l.at; });
  const accessed=TEACHERS.filter(t=>by[t.name]).sort((a,b)=> (by[b.name].last||'').localeCompare(by[a.name].last||''));
  const never=TEACHERS.filter(t=>!by[t.name]);
  let rows=accessed.map(t=>`<tr><td>${esc(t.name)} ${t.admin?'<span class="tag warn">관리자</span>':''}</td><td>${esc(t.cell||t.role)}</td><td>${relTime(by[t.name].last)}</td><td class="r">${by[t.name].count}회</td></tr>`).join('');
  return `
  <div class="card">
    <h2>📊 접속 현황</h2>
    <div class="sub">선생님별 마지막 접속·접속 횟수 (30분 단위 기록)</div>
    <div class="kpis">
      <div class="kpi ok"><div class="n">${accessed.length}</div><div class="l">접속한 선생님</div></div>
      <div class="kpi ${never.length?'danger':'ok'}"><div class="n">${never.length}</div><div class="l">아직 미접속</div></div>
      <div class="kpi info"><div class="n">${TEACHERS.length}</div><div class="l">전체 선생님</div></div>
    </div>
    ${never.length?`<div style="margin-bottom:12px"><b style="color:#fca5a5">아직 한 번도 접속 안 함:</b><div class="chips" style="margin-top:6px">${never.map(t=>`<span class="chip danger">${esc(t.name)}${t.cell?' ('+esc(t.cell)+')':''}</span>`).join('')}</div></div>`:''}
    <table><thead><tr><th>선생님</th><th>소속</th><th>마지막 접속</th><th class="r">횟수</th></tr></thead><tbody>${rows||'<tr><td colspan="4" class="loading">접속 기록이 아직 없습니다.</td></tr>'}</tbody></table>
  </div>`;
}

/* 2) 출석 입력/누락 */
function sectionAttendance(att){
  window.__ATT=att;
  const weeks=recentSundays(8).filter(w=> new Date(w)<=new Date());
  if(!weeks.includes(SEL_WEEK)) SEL_WEEK=weeks[0];
  const opts=weeks.map(w=>`<option value="${w}" ${w===SEL_WEEK?'selected':''}>${w} (${fmtWk(w)})${w===weeks[0]?' · 이번 주':''}</option>`).join('');
  return `
  <div class="card">
    <h2>✅ 출석 입력 / 누락</h2>
    <div class="sub">셀별 출석 입력 현황 (Supabase 공유 데이터 기준)</div>
    <div class="week-pick">📅 주차: <select id="wk-sel">${opts}</select></div>
    <div id="att-body">${attTable(att)}</div>
  </div>`;
}
function attTable(att){
  const wkData=att[SEL_WEEK]||{};
  let done=0, partial=0, missing=0;
  const rows=CELL_ORDER.map(cell=>{
    const studs=CELL_STUDENTS[cell]||[];
    const entered=studs.filter(s=>wkData[s.name]&&wkData[s.name].status).length;
    const ct=CELL_TEACHERS[cell]||{};
    let tag;
    if(entered===0){ tag='<span class="tag danger">미입력</span>'; missing++; }
    else if(entered<studs.length){ tag='<span class="tag warn">일부 ('+entered+'/'+studs.length+')</span>'; partial++; }
    else { tag='<span class="tag ok">완료</span>'; done++; }
    return `<tr><td><b>${cell}</b></td><td>${esc(ct.homeroom||'')}${ct.sub?' · '+esc(ct.sub):''}</td><td class="c">${entered}/${studs.length}</td><td class="c">${tag}</td></tr>`;
  }).join('');
  return `
    <div class="kpis">
      <div class="kpi ok"><div class="n">${done}</div><div class="l">입력 완료 셀</div></div>
      <div class="kpi warn"><div class="n">${partial}</div><div class="l">일부 입력</div></div>
      <div class="kpi danger"><div class="n">${missing}</div><div class="l">미입력 셀</div></div>
    </div>
    <table><thead><tr><th>셀</th><th>담임·부담임</th><th class="c">입력</th><th class="c">상태</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="muted-note">※ Special 셀은 출석 입력 대상이 아니라 제외했습니다. 미입력 셀 담임 선생님께 안내해 주세요.</div>`;
}

/* 3) 사진 등록 현황 */
function sectionPhotos(photoSet){
  let have=0; const missingByCell=[];
  ALL_CELLS.forEach(cell=>{
    const studs=CELL_STUDENTS[cell]||[];
    const miss=[];
    studs.forEach(s=>{ if(photoSet.has(Photos.slug(s.name))) have++; else miss.push(s); });
    if(miss.length) missingByCell.push({cell, miss});
  });
  const total=ALL_CELLS.reduce((a,c)=>a+(CELL_STUDENTS[c]||[]).length,0);
  const missTotal=total-have;
  const missHtml=missingByCell.map(g=>`<div style="margin-top:8px"><b>${g.cell}</b> <span class="tag muted">${g.miss.length}명</span><div class="chips" style="margin-top:5px">${g.miss.map(s=>`<span class="chip"><img class="stu-photo-sm" src="${Photos.defaultAvatar(s.gender)}" alt="">${esc(s.name)}</span>`).join('')}</div></div>`).join('');
  return `
  <div class="card">
    <h2>📸 사진 등록 현황</h2>
    <div class="sub">전체 ${total}명 중 사진 등록 상태</div>
    <div class="kpis">
      <div class="kpi ok"><div class="n">${have}</div><div class="l">등록 완료</div></div>
      <div class="kpi ${missTotal?'danger':'ok'}"><div class="n">${missTotal}</div><div class="l">미등록</div></div>
      <div class="kpi info"><div class="n">${Math.round(have/total*100)}%</div><div class="l">등록률</div></div>
    </div>
    ${missTotal?`<div><b style="color:#fca5a5">미등록 학생 (셀별):</b>${missHtml}</div>`:'<div class="tag ok">🎉 전원 사진 등록 완료!</div>'}
  </div>`;
}

/* 4) 기도·공지 현황/관리 */
function sectionPrayerNotice(prayers, notices){
  const pItems=(prayers&&(prayers.items||prayers))||[];
  const nItems=(notices&&(notices.items||notices))||[];
  const pActive=pItems.filter(x=>x.active!==false).length;
  const nActive=nItems.filter(x=>x.active!==false).length;
  return `
  <div class="card">
    <h2>🙏 기도제목 · 📢 공지 현황 / 관리</h2>
    <div class="sub">전체 공유(GitHub) 데이터 기준</div>
    <div class="kpis">
      <div class="kpi info"><div class="n">${pActive}</div><div class="l">공유 기도제목</div></div>
      <div class="kpi info"><div class="n">${nActive}</div><div class="l">활성 공지</div></div>
    </div>
    <div class="gh-links">
      <a href="${GH}/notices.json" target="_blank">📢 공지 편집</a>
      <a href="${GH}/schedule.json" target="_blank">📅 일정 편집</a>
      <a href="${GH}/prayers.json" target="_blank">🙏 전체 기도제목 편집</a>
      <a href="ADMIN_GUIDE.md" target="_blank">📖 관리 가이드</a>
    </div>
    <div class="muted-note">GitHub에서 편집 → "Commit changes" → 1~2분 후 모든 화면 반영. (학생 개인 기도제목은 각 선생님이 prayer.html에서 관리)</div>
  </div>`;
}

/* ============ 초기화 ============ */
fillSelect();
(function(){
  const pin=localStorage.getItem('access_pin'), name=localStorage.getItem('mock_teacher');
  if(pin===PRIVATE_KEY && name){ const me=TEACHERS.find(t=>t.name===name); if(me && me.admin){ MY=me; enterApp(); return; } }
  document.getElementById('pin-input').addEventListener('keydown', e=>{ if(e.key==='Enter') adminLogin(); });
})();
</script>
